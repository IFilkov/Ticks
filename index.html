<!doctype html>
<html>
  <head>
    <title>Tick Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #1d1d1d;
      }
      canvas {
        border: 2px solid #333;
      }
    </style>
  </head>
  <body>
    <script>
      // =================================================================
      // SCENE 1: PRELOAD
      // =================================================================
      class PreloadScene extends Phaser.Scene {
        constructor() {
          super("PreloadScene");
        }

        preload() {
          const assetPath = "assets/images/";
          this.load.spritesheet("player", `${assetPath}player_sprite.png`, {
            frameWidth: 216,
            frameHeight: 312,
          });

          // =================================================================================
          //  *** ЭТО ПРАВИЛЬНЫЕ, ТОЧНЫЕ РАЗМЕРЫ ВАШЕГО СПРАЙТА ***
          // =================================================================================
          this.load.spritesheet("dog_sprite", `${assetPath}dog_sprite.png`, {
            frameWidth: 195,
            frameHeight: 128,
          });

          this.load.image("tick", `${assetPath}tick.png`);
          this.load.image("sky", `${assetPath}sky.jpg`);
          this.load.image("background", `${assetPath}background.png`);
        }

        create() {
          this.scene.start("GameScene");
          this.scene.launch("UIScene");
        }
      }

      // =================================================================
      // SCENE 2: GAME
      // =================================================================
      class GameScene extends Phaser.Scene {
        constructor() {
          super("GameScene");
        }

        create() {
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");

          // Dog Setup
          this.dog = this.physics.add.sprite(200, 580, "dog_sprite");
          this.dog.setOrigin(0.5, 1);
          this.dog.body.allowGravity = false;
          this.dog.setCollideWorldBounds(true);
          // this.dog.body.setSize(240, 120).setOffset(24, 35);

          this.mouth = this.add.zone(0, 0, 60, 60);
          this.physics.world.enable(this.mouth);
          this.mouth.body.setAllowGravity(false);

          // Human Setup
          this.human = this.physics.add.sprite(100, 580, "player");
          this.human.setOrigin(0.5, 1);
          this.human.body.allowGravity = false;
          this.human.body.setSize(
            this.human.width * 0.5,
            this.human.height * 0.9,
          );
          this.humanHealth = 100;
          this.humanSpeed = 100;
          this.humanDirection = 1;
          this.humanPaused = false;
          this.isHumanDead = false;

          this.createAnimations();

          this.time.addEvent({
            delay: 6000,
            loop: true,
            callback: () => {
              this.humanPaused = true;
              this.time.delayedCall(4000, () => {
                this.humanPaused = false;
              });
            },
          });

          this.cursors = this.input.keyboard.createCursorKeys();
          this.jumpKey = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.SPACE,
          );
          this.isJumping = false;

          this.ticks = this.physics.add.group();
          this.wave = 1;
          this.ticksToSpawn = 5;
          this.spawnInterval = 1500;
          this.startWave();
        }

        update() {
          if (this.isHumanDead) return;

          // =================================================================
          // *** ОСНОВНОЙ ЦИКЛ ТЕПЕРЬ ЧИСТЫЙ И ПРАВИЛЬНЫЙ ***
          // =================================================================
          this.updateDog();
          this.updateHuman();
          this.updateTicks();
        }

        // updateDog() {
        //   // =================================================================
        //   // *** ВОТ ГЛАВНОЕ ИСПРАВЛЕНИЕ: ПОЗИЦИЯ РТА ОБНОВЛЯЕТСЯ ВСЕГДА ***
        //   // =================================================================
        //   this.mouth.x = this.dog.body.center.x;
        //   this.mouth.y = this.dog.body.center.y - 40;

        //   if (Phaser.Input.Keyboard.JustDown(this.jumpKey) && !this.isJumping) {
        //     this.isJumping = true;
        //     this.dog.anims.play("dog_jump");

        //     if (this.cursors.left.isDown) {
        //       this.dog.setVelocityX(-200);
        //     } else if (this.cursors.right.isDown) {
        //       this.dog.setVelocityX(200);
        //     } else {
        //       this.dog.setVelocityX(0);
        //     }

        //     this.tweens.add({
        //       targets: this.dog,
        //       y: this.dog.y - 280,
        //       duration: 400,
        //       yoyo: true,
        //       ease: "Power2",
        //       onComplete: () => {
        //         this.isJumping = false;
        //         this.dog.setVelocityX(0);
        //       },
        //     });
        //   }

        //   if (this.isJumping) {
        //     return; // Если в прыжке, не обрабатываем ходьбу
        //   }

        //   if (this.cursors.left.isDown) {
        //     this.dog.setVelocityX(-200);
        //     this.dog.anims.play("dog_walk_left", true);
        //   } else if (this.cursors.right.isDown) {
        //     this.dog.setVelocityX(200);
        //     this.dog.anims.play("dog_walk_right", true);
        //   } else {
        //     this.dog.setVelocityX(0);
        //     this.dog.anims.play("dog_idle", true);
        //   }
        // }
        updateDog() {
          this.mouth.x = this.dog.body.center.x;
          this.mouth.y = this.dog.body.center.y - 40;

          if (Phaser.Input.Keyboard.JustDown(this.jumpKey) && !this.isJumping) {
            this.isJumping = true;
            this.dog.anims.play("dog_jump");

            // Устанавливаем отражение для прыжка, основываясь на "памяти"
            this.dog.flipX = this.dogFacing === "left";

            if (this.cursors.left.isDown) {
              this.dog.setVelocityX(-200);
            } else if (this.cursors.right.isDown) {
              this.dog.setVelocityX(200);
            } else {
              this.dog.setVelocityX(0);
            }

            this.tweens.add({
              targets: this.dog,
              y: this.dog.y - 280,
              duration: 400,
              yoyo: true,
              ease: "Power2",
              onComplete: () => {
                this.isJumping = false;
                this.dog.setVelocityX(0);
              },
            });
          }

          if (this.isJumping) return;

          if (this.cursors.left.isDown) {
            this.dog.setVelocityX(-200);
            this.dog.anims.play("dog_walk_left", true);
            this.dogFacing = "left"; // Обновляем "память"
            this.dog.flipX = false; // Принудительно отключаем flipX для этой анимации
          } else if (this.cursors.right.isDown) {
            this.dog.setVelocityX(200);
            this.dog.anims.play("dog_walk_right", true);
            this.dogFacing = "right"; // Обновляем "память"
            this.dog.flipX = false; // Принудительно отключаем flipX для этой анимации
          } else {
            this.dog.setVelocityX(0);
            this.dog.anims.play("dog_idle", true);
            // Устанавливаем отражение для idle, основываясь на "памяти"
            this.dog.flipX = this.dogFacing === "left";
          }
        }

        createAnimations() {
          this.anims.create({
            key: "human_walk",
            frames: this.anims.generateFrameNumbers("player", {
              start: 4,
              end: 11,
            }),
            frameRate: 10,
            repeat: -1,
          });
          this.anims.create({
            key: "human_idle",
            frames: this.anims.generateFrameNumbers("player", {
              start: 0,
              end: 3,
            }),
            frameRate: 5,
            repeat: -1,
          });
          this.anims.create({
            key: "human_death",
            frames: this.anims.generateFrameNumbers("player", {
              start: 12,
              end: 15,
            }),
            frameRate: 10,
            repeat: 0,
          });

          // =================================================================
          // *** НОВАЯ, ПРАВИЛЬНАЯ НАСТРОЙКА АНИМАЦИЙ СОБАКИ ***
          // =================================================================
          this.anims.create({
            key: "dog_idle",
            frames: this.anims.generateFrameNumbers("dog_sprite", {
              start: 0,
              end: 3,
            }),
            frameRate: 5,
            repeat: -1,
          });
          this.anims.create({
            key: "dog_walk_right",
            frames: this.anims.generateFrameNumbers("dog_sprite", {
              start: 12,
              end: 15,
            }),
            frameRate: 10,
            repeat: -1,
          });
          this.anims.create({
            key: "dog_walk_left",
            frames: this.anims.generateFrameNumbers("dog_sprite", {
              start: 5,
              end: 7,
            }),
            frameRate: 10,
            repeat: -1,
          });
          this.anims.create({
            key: "dog_jump",
            frames: this.anims.generateFrameNumbers("dog_sprite", {
              start: 12,
              end: 15,
            }),
            frameRate: 12,
            repeat: 0,
          });
        }

        updateHuman() {
          if (this.isHumanDead) return;

          // 1. Устанавливаем скорость (или ее отсутствие)
          if (this.humanPaused) {
            this.human.setVelocityX(0);
          } else {
            const leftBound = 40,
              rightBound = 760;
            if (this.human.x >= rightBound) {
              this.humanDirection = -1;
            } else if (this.human.x <= leftBound) {
              this.humanDirection = 1;
            }
            this.human.setVelocityX(this.humanSpeed * this.humanDirection);
          }

          // 2. Устанавливаем анимацию и отражение на основе РЕЗУЛЬТИРУЮЩЕЙ скорости
          if (this.human.body.velocity.x > 0) {
            this.human.flipX = false;
            this.human.anims.play("human_walk", true);
          } else if (this.human.body.velocity.x < 0) {
            this.human.flipX = true;
            this.human.anims.play("human_walk", true);
          } else {
            this.human.anims.play("human_idle", true);
          }
        }
        // updateTicks() {
        //   this.physics.overlap(this.mouth, this.ticks, (mouth, tick) => {
        //     if (tick.body) tick.destroy();
        //   });
        //   this.physics.overlap(this.human, this.ticks, (human, tick) => {
        //     if (tick.body && human.body) {
        //       this.events.emit("damageHuman", 10);
        //       tick.destroy();
        //     }
        //   });
        //   this.ticks.getChildren().forEach((tick) => {
        //     if (tick && tick.y > 600) tick.destroy();
        //   });
        // }
        updateTicks() {
          this.physics.overlap(this.mouth, this.ticks, (mouth, tick) => {
            if (tick.body) tick.destroy();
          });
          this.physics.overlap(this.human, this.ticks, (human, tick) => {
            if (tick.body && human.body) {
              this.events.emit("damageHuman", 10);
              tick.destroy();
            }
          });
          this.ticks.getChildren().forEach((tick) => {
            if (tick && tick.y > 600) tick.destroy();
          });
        }

        startWave() {
          if (this.isHumanDead) return;
          this.ticksSpawned = 0;
          this.events.emit("updateWave", this.wave);
          if (this.tickSpawner) this.tickSpawner.remove();
          this.tickSpawner = this.time.addEvent({
            delay: this.spawnInterval,
            loop: true,
            callback: () => {
              if (this.ticksSpawned >= this.ticksToSpawn) {
                this.tickSpawner.remove();
                this.time.delayedCall(2000, () => {
                  this.wave++;
                  this.ticksToSpawn = Math.floor(this.ticksToSpawn * 1.4);
                  this.spawnInterval = Math.max(600, this.spawnInterval - 150);
                  this.startWave();
                });
                return;
              }
              this.spawnTick();
              this.ticksSpawned++;
            },
          });
        }

        spawnTick() {
          if (this.isHumanDead) return;
          const x = Phaser.Math.Between(50, 750);
          const tick = this.ticks.create(x, -50, "tick");
          if (tick) {
            tick.setScale(0.8);
            tick.setGravityY(Phaser.Math.Between(50, 150));
          }
        }
        // spawnTick() {
        //   const startX = Phaser.Math.Between(50, 750);
        //   const startY = 600;

        //   const midY = 200;
        //   const endX = startX + Phaser.Math.Between(-200, 200);
        //   const endY = 600;

        //   const tick = this.add.sprite(startX, startY, "tick").setScale(0.8);

        //   // 👉 Важно: флаг состояния клеща
        //   tick.isFalling = false;

        //   this.tweens.add({
        //     targets: tick,
        //     x: {
        //       getStart: () => startX,
        //       getEnd: () => endX,
        //     },
        //     y: {
        //       getStart: () => startY,
        //       getEnd: () => endY,
        //     },
        //     ease: (t) => {
        //       const p = Phaser.Math.Easing.Quadratic.Out(t);
        //       return p;
        //     },

        //     onUpdate: (tween, target) => {
        //       const t = tween.progress;

        //       const yUp = Phaser.Math.Interpolation.Linear(
        //         [startY, midY],
        //         t * 2,
        //       );
        //       const yDown = Phaser.Math.Interpolation.Linear(
        //         [midY, endY],
        //         (t - 0.5) * 2,
        //       );

        //       target.y = t < 0.5 ? yUp : yDown;

        //       // 👉 Когда t > 0.5 — клещ падает
        //       if (!target.isFalling && t > 0.5) {
        //         target.isFalling = true;
        //       }
        //     },

        //     duration: Phaser.Math.Between(1000, 1600),

        //     // 👉 Когда долетел до земли — удалить
        //     onComplete: () => {
        //       tick.destroy();
        //     },
        //   });

        //   // Добавим в группу, если ты её используешь для коллизий
        //   if (this.ticks) this.ticks.add(tick);
        // }
      }

      // Re-pasting unchanged methods for GameScene
      GameScene.prototype.updateTicks = function () {
        this.physics.overlap(this.mouth, this.ticks, (mouth, tick) => {
          if (tick.body) tick.destroy();
        });
        this.physics.overlap(this.human, this.ticks, (human, tick) => {
          if (tick.body && human.body) {
            this.events.emit("damageHuman", 10);
            tick.destroy();
          }
        });
        this.ticks.getChildren().forEach((tick) => {
          if (tick && tick.y > 600) tick.destroy();
        });
      };
      GameScene.prototype.startWave = function () {
        if (this.isHumanDead) return;
        this.ticksSpawned = 0;
        this.events.emit("updateWave", this.wave);
        if (this.tickSpawner) this.tickSpawner.remove();
        this.tickSpawner = this.time.addEvent({
          delay: this.spawnInterval,
          loop: true,
          callback: () => {
            if (this.ticksSpawned >= this.ticksToSpawn) {
              this.tickSpawner.remove();
              this.time.delayedCall(2000, () => {
                this.wave++;
                this.ticksToSpawn = Math.floor(this.ticksToSpawn * 1.4);
                this.spawnInterval = Math.max(600, this.spawnInterval - 150);
                this.startWave();
              });
              return;
            }
            this.spawnTick();
            this.ticksSpawned++;
          },
        });
      };
      GameScene.prototype.spawnTick = function () {
        if (this.isHumanDead) return;
        const x = Phaser.Math.Between(50, 750);
        const tick = this.ticks.create(x, -50, "tick");
        if (tick) {
          tick.setScale(0.8);
          tick.setGravityY(Phaser.Math.Between(50, 150));
        }
      };

      // =================================================================
      // SCENE 3: UI
      // =================================================================
      class UIScene extends Phaser.Scene {
        constructor() {
          super("UIScene");
        }
        create() {
          this.healthBarBg = this.add
            .rectangle(120, 30, 160, 20, 0x000000)
            .setOrigin(0.5);
          this.healthBar = this.add
            .rectangle(120, 30, 160, 20, 0x00ff00)
            .setOrigin(0.5);
          this.healthText = this.add.text(45, 45, "HP: 100%", {
            fontSize: "14px",
            fill: "#fff",
          });
          this.waveText = this.add
            .text(400, 30, "Wave 1", { fontSize: "24px", fill: "#ffffff" })
            .setOrigin(0.5);
          const gameScene = this.scene.get("GameScene");
          gameScene.events.on("updateWave", (wave) =>
            this.waveText.setText(`Wave ${wave}`),
          );
          gameScene.events.on("damageHuman", (damage) => {
            if (gameScene.isHumanDead) return;
            gameScene.humanHealth -= damage;
            this.updateHealthBar(gameScene.humanHealth);
            if (gameScene.humanHealth <= 0) {
              gameScene.isHumanDead = true;
              const human = gameScene.human;
              human.anims.play("human_death", true);
              human.on(
                "animationcomplete",
                () => {
                  gameScene.scene.pause();
                  this.add
                    .text(400, 300, "GAME OVER", {
                      fontSize: "40px",
                      color: "#ff0000",
                    })
                    .setOrigin(0.5);
                },
                this,
              );
            }
          });
        }
        updateHealthBar(health) {
          const currentHealth = Math.max(0, health);
          this.healthBar.width = (currentHealth / 100) * 160;
          if (currentHealth > 60) this.healthBar.setFillStyle(0x00ff00);
          else if (currentHealth > 30) this.healthBar.setFillStyle(0xffff00);
          else this.healthBar.setFillStyle(0xff0000);
          this.healthText.setText(`HP: ${currentHealth}%`);
        }
      }

      // Re-pasting unchanged methods for UIScene
      UIScene.prototype.create = function () {
        this.healthBarBg = this.add
          .rectangle(120, 30, 160, 20, 0x000000)
          .setOrigin(0.5);
        this.healthBar = this.add
          .rectangle(120, 30, 160, 20, 0x00ff00)
          .setOrigin(0.5);
        this.healthText = this.add.text(45, 45, "HP: 100%", {
          fontSize: "14px",
          fill: "#fff",
        });
        this.waveText = this.add
          .text(400, 30, "Wave 1", { fontSize: "24px", fill: "#ffffff" })
          .setOrigin(0.5);
        const gameScene = this.scene.get("GameScene");
        gameScene.events.on("updateWave", (wave) =>
          this.waveText.setText(`Wave ${wave}`),
        );
        gameScene.events.on("damageHuman", (damage) => {
          if (gameScene.isHumanDead) return;
          gameScene.humanHealth -= damage;
          this.updateHealthBar(gameScene.humanHealth);
          if (gameScene.humanHealth <= 0) {
            gameScene.isHumanDead = true;
            const human = gameScene.human;
            human.anims.play("human_death", true);
            human.on(
              "animationcomplete",
              () => {
                gameScene.scene.pause();
                this.add
                  .text(400, 300, "GAME OVER", {
                    fontSize: "40px",
                    color: "#ff0000",
                  })
                  .setOrigin(0.5);
              },
              this,
            );
          }
        });
      };
      UIScene.prototype.updateHealthBar = function (health) {
        const currentHealth = Math.max(0, health);
        this.healthBar.width = (currentHealth / 100) * 160;
        if (currentHealth > 60) this.healthBar.setFillStyle(0x00ff00);
        else if (currentHealth > 30) this.healthBar.setFillStyle(0xffff00);
        else this.healthBar.setFillStyle(0xff0000);
        this.healthText.setText(`HP: ${currentHealth}%`);
      };

      // =================================================================
      // GAME CONFIGURATION
      // =================================================================
      const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        backgroundColor: "#1d1d1d",
        physics: {
          default: "arcade",
          arcade: {
            debug: true, // Отладчик выключен
          },
        },
        scene: [PreloadScene, GameScene, UIScene],
      };

      window.onload = () => new Phaser.Game(config);
    </script>
  </body>
</html>
