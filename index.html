        updateDogHealthBar(health) {
          const currentHealth = Math.max(0, health);
          this.dogHealthBar.width = (currentHealth / 100) * 160;
          if (currentHealth > 60) this.dogHealthBar.setFillStyle(0x00ff00);
          else if (currentHealth > 30) this.dogHealthBar.setFillStyle(0xffff00);
          else this.dogHealthBar.setFillStyle(0xff0000);
          this.dogHealthText.setText(`HP: ${currentHealth}%`);
        }

        updateHumanHealthBar(health) {
          const currentHealth = Math.max(0, health);
          this.humanHealthBar.width = (currentHealth / 100) * 160;
          if (currentHealth > 60) this.humanHealthBar.setFillStyle(0x00ff00);
          else if (currentHealth > 30)
            this.humanHealthBar.setFillStyle(0xffff00);
          else this.humanHealthBar.setFillStyle(0xff0000);
          this.humanHealthText.setText(`HP: ${currentHealth}%`);
        }

        updateHomelessHealthBar(health) {
          const currentHealth = Math.max(0, health);
          this.homelessHealthBar.width = (currentHealth / 100) * 200;
          if (currentHealth > 60)
            this.homelessHealthBar.setFillStyle(0xff9900); // Оранжевый
          else if (currentHealth > 30)
            this.homelessHealthBar.setFillStyle(0xffaa00); // Светло-оранжевый
          else this.homelessHealthBar.setFillStyle(0xff0000); // Красный
          this.homelessHealthText.setText(`HP: ${currentHealth}%`);
        }

        showGameOver() {
          console.log("=== ПОКАЗЫВАЕМ GAME OVER (Scene2) ===");
          const gameOverText = this.add
            .text(400, 300, "ИГРА ОКОНЧЕНА", {
              fontSize: "200px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#ff0000",
              stroke: "#000000",
              strokeThickness: 12,
            })
            .setOrigin(0.5)
            .setShadow(10, 10, "#000000", 20, true, true);

          console.log("Создан текст ИГРА ОКОНЧЕНА с fontSize: 200px");

          // Анимация появления
          this.tweens.add({
            targets: gameOverText,
            alpha: { from: 0, to: 1 },
            scale: { from: 0.5, to: 1.0 },
            duration: 600,
            ease: "Back.easeOut",
          });

          // Через 5 секунд возврат в меню
          this.time.delayedCall(5000, () => {
            this.scene.stop("Scene2");
            this.scene.stop("UIScene2");
            this.scene.start("MainMenuScene");
          });
        }

        shutdown() {
          // Очищаем все события при остановке сцены
          const gameScene = this.scene.get("Scene2");
          if (gameScene) {
            gameScene.events.off("updateWave");
            gameScene.events.off("damageDog");
            gameScene.events.off("damageHuman");
            gameScene.events.off("healDog");
            gameScene.events.off("healHuman");
            gameScene.events.off("showHomelessBar");
            gameScene.events.off("damageHomeless");
            gameScene.events.off("healHomeless");
            gameScene.events.off("updateKickCount");
          }
        }
      }

      // =================================================================
      // SCENE 4: ИССЛЕДОВАНИЕ - После победы над бомжом
      // =================================================================
      class Scene4 extends Phaser.Scene {
        constructor() {
          super("Scene4");
        }

        create() {
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background2");

          // *** ИГРОК (ЧЕЛОВЕК) - УПРАВЛЯЕТСЯ ***
          this.human = this.physics.add.sprite(200, 580, "player");
          this.human.setOrigin(0.5, 1);
          this.human.body.allowGravity = false;
          this.human.body.setSize(
            this.human.width * 0.5,
            this.human.height * 0.9,
          );
          this.human.setCollideWorldBounds(true);
          this.humanFacing = "right";
          this.isJumping = false;
          this.humanHealth = 100;
          this.isHumanDead = false;

          // *** СОБАКА - НА AI ***
          this.dog = this.physics.add.sprite(600, 580, "dog_sprite");
          this.dog.setOrigin(0.5, 1);
          this.dog.body.allowGravity = false;
          this.dog.setCollideWorldBounds(true);
          this.dog.body.setSize(150, 100);
          this.dogDirection = "left";

          // *** УПРАВЛЕНИЕ ***
          this.cursors = this.input.keyboard.createCursorKeys();
          this.jumpKey = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.SPACE,
          );

          // *** AI ТАЙМЕР ДЛЯ СОБАКИ ***
          this.time.addEvent({
            delay: Phaser.Math.Between(1500, 3000),
            loop: true,
            callback: () => {
              const action = Phaser.Math.RND.pick(["left", "right", "idle"]);
              switch (action) {
                case "left":
                  this.dog.setVelocityX(-80);
                  this.dogDirection = "left";
                  break;
                case "right":
                  this.dog.setVelocityX(80);
                  this.dogDirection = "right";
                  break;
                case "idle":
                  this.dog.setVelocityX(0);
                  break;
              }
            },
          });

          // *** SOCKET — Летающая розетка ***
          this.socket = this.physics.add.sprite(
            Phaser.Math.Between(150, 650),
            Phaser.Math.Between(100, 350),
            "socket",
          );
          this.socket.setOrigin(0.5, 0.5);
          this.socket.body.allowGravity = false;
          this.socket.setCollideWorldBounds(true);
          this.socket.body.setBounce(1, 1);
          this.socket.setScale(0.5); // 512px -> ~256px на экране
          this.socket.body.setSize(400, 400); // hitbox под scale
          this.socket.anims.play("socket_fly", true);
          this.socketHealth = 100;
          this.isSocketDead = false;

          // 4 направления: лево, право, вверх, вниз
          const socketDirs = [
            [200, 0], // вправо
            [-200, 0], // влево
            [0, 180], // вниз
            [0, -180], // вверх
          ];
          const startDir = Phaser.Math.RND.pick(socketDirs);
          this.socket.setVelocity(startDir[0], startDir[1]);

          // Таймер смены направления каждые 1.5-3 секунды
          this.socketDirTimer = this.time.addEvent({
            delay: Phaser.Math.Between(1500, 3000),
            loop: true,
            callback: () => {
              if (!this.socket || !this.socket.active) return;
              // Выбираем новое направление, отличное от текущего
              const vel = this.socket.body.velocity;
              const allDirs = [
                [210, 0],
                [-210, 0],
                [0, 190],
                [0, -190],
              ];
              let newDir = Phaser.Math.RND.pick(allDirs);
              // Небольшая скоростная вариация
              const speedMult = Phaser.Math.FloatBetween(0.85, 1.3);
              this.socket.setVelocity(
                newDir[0] * speedMult,
                newDir[1] * speedMult,
              );
            },
          });

          // *** CONECTER — подбираемый предмет ***
          this.conecters = this.physics.add.group();
          this.human.hasConnecter = false;
          this.carriedConnecter = this.add
            .image(0, 0, "conecter")
            .setScale(0.18)
            .setVisible(false);

          // Спавн conecter каждые 12 секунд
          this.time.addEvent({
            delay: 12000,
            loop: true,
            callback: this.spawnConnecter,
            callbackScope: this,
          });
          // Первый спавн через 5 секунд
          this.time.delayedCall(5000, this.spawnConnecter, [], this);

          // *** SOCKET MOUTH — рот в центре socket ***
          this.socketMouth = this.add.zone(0, 0, 80, 80);
          this.physics.world.enable(this.socketMouth);
          this.socketMouth.body.setAllowGravity(false);
          this.socketMouth.x = -999;
          this.flashCooldown = false;

          // *** CONECTER MOUTH — рот в центре conecter ***
          this.conecterMouth = this.add.zone(0, 0, 60, 60);
          this.physics.world.enable(this.conecterMouth);
          this.conecterMouth.body.setAllowGravity(false);
          this.conecterMouth.x = -999;
          this.boomCooldown = false;

          // *** THROWN CONECTER — летящий броском ***
          this.thrownConnecter = null; // ссылка на летящий снаряд

          console.log("🎮 Scene4: Игрок, собака и розетка созданы");
        }

        update() {
          this.updateHumanPlayer();
          this.updateDogAI();
          this.updateConnecter();

          // Флип розетки + рот + flash на игроке
          if (this.socket && this.socket.active) {
            const vel = this.socket.body.velocity;
            if (vel.x < -10) {
              this.socket.flipX = true;
            } else if (vel.x > 10) {
              this.socket.flipX = false;
            }
            if (Math.abs(vel.x) < 15 && Math.abs(vel.y) < 15) {
              const dirs = [
                [180, 0],
                [-180, 0],
                [0, 180],
                [0, -180],
              ];
              const d = Phaser.Math.RND.pick(dirs);
              this.socket.setVelocity(d[0], d[1]);
            }
            // Рот socket всегда в центре спрайта
            this.socketMouth.x = this.socket.x;
            this.socketMouth.y = this.socket.y;

            // Flash при касании игрока ртом socket
            if (
              !this.flashCooldown &&
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.socketMouth.getBounds(),
                this.human.getBounds(),
              )
            ) {
              this.flashCooldown = true;
              const fx = this.add.sprite(
                this.human.x,
                this.human.y - 150,
                "flash",
              );
              fx.setScale(1.2);
              fx.setBlendMode(Phaser.BlendModes.ADD);
              fx.setDepth(10);
              fx.anims.play("flash_anim");
              fx.once("animationcomplete", () => fx.destroy());
              this.human.setTint(0x44aaff);
              this.time.delayedCall(300, () => {
                if (this.human) this.human.clearTint();
              });
              this.time.delayedCall(1500, () => {
                this.flashCooldown = false;
              });
              // -5 HP игроку
              this.events.emit("damageHuman4", 5);
            }
          } else {
            this.socketMouth.x = -999;
          }
        }

        updateHumanPlayer() {
          // Получаем джойстик для мобильных
          const joystickState = this.registry.get("joystickState") || {};
          const isMobile = this.registry.get("isMobile") || false;

          // Прыжок - клавиатура или джойстик вверх
          const jumpPressed =
            Phaser.Input.Keyboard.JustDown(this.jumpKey) ||
            (isMobile && joystickState.isJumping);
          if (jumpPressed && !this.isJumping) {
            this.isJumping = true;

            // Определяем направление прыжка
            let jumpVelocityX = 0;

            if (isMobile && joystickState.jumpDirection) {
              // Прыжок по диагонали на мобильном
              if (joystickState.jumpDirection === "left") {
                jumpVelocityX = -200;
                this.humanFacing = "left";
                this.human.flipX = true;
              } else if (joystickState.jumpDirection === "right") {
                jumpVelocityX = 200;
                this.humanFacing = "right";
                this.human.flipX = false;
              }
            } else {
              // Клавиатура
              const leftPressed = this.cursors.left.isDown;
              const rightPressed = this.cursors.right.isDown;

              if (leftPressed) {
                jumpVelocityX = -200;
                this.humanFacing = "left";
                this.human.flipX = true;
              } else if (rightPressed) {
                jumpVelocityX = 200;
                this.humanFacing = "right";
                this.human.flipX = false;
              }
            }

            this.human.setVelocityX(jumpVelocityX);

            this.tweens.add({
              targets: this.human,
              y: this.human.y - 280,
              duration: 400,
              yoyo: true,
              ease: "Power2",
              onComplete: () => {
                this.isJumping = false;
                this.human.setVelocityX(0);
              },
            });
          }

          if (this.isJumping) return;

          // Горизонтальное движение
          const leftPressed =
            this.cursors.left.isDown || (isMobile && joystickState.left);
          const rightPressed =
            this.cursors.right.isDown || (isMobile && joystickState.right);

          if (leftPressed) {
            this.human.setVelocityX(-200);
            this.human.anims.play("human_walk", true);
            this.human.flipX = true;
            this.humanFacing = "left";
          } else if (rightPressed) {
            this.human.setVelocityX(200);
            this.human.anims.play("human_walk", true);
            this.human.flipX = false;
            this.humanFacing = "right";
          } else {
            this.human.setVelocityX(0);
            this.human.anims.play("human_idle", true);
          }

          // Бросок conecter — клавиша вниз или джойстик вниз
          const downJustPressed =
            Phaser.Input.Keyboard.JustDown(this.cursors.down) ||
            (isMobile && joystickState.down && !this._prevDown);
          this._prevDown = isMobile && joystickState.down;

          if (
            downJustPressed &&
            this.human.hasConnecter &&
            !this.thrownConnecter
          ) {
            this.throwConnecter();
          }
        }

        throwConnecter() {
          this.human.hasConnecter = false;
          this.carriedConnecter.setVisible(false);
          if (this.conecterTimer) this.conecterTimer.remove();

          // Создаём физический снаряд
          const proj = this.physics.add.image(
            this.carriedConnecter.x,
            this.carriedConnecter.y,
            "conecter",
          );
          proj.setScale(0.18);
          proj.body.setAllowGravity(false);
          proj.setDepth(5);

          // Направление броска и угол совпадают с последним поворотом carriedConnecter
          const angle = this.carriedConnecter.angle;
          proj.setAngle(angle);

          // Вектор скорости по направлению броска
          const speed = 600;
          let vx = 0,
            vy = 0;
          if (angle === 0) {
            vy = -speed; // стоит — бросок вверх
          } else if (angle === 90) {
            vx = speed; // вправо
          } else if (angle === -90) {
            vx = -speed; // влево
          } else if (angle === 180) {
            vx = this.humanFacing === "right" ? speed : -speed;
          } else {
            // По умолчанию — по направлению взгляда
            vx = this.humanFacing === "right" ? speed : -speed;
          }
          proj.setVelocity(vx, vy);

          // Рот снаряда (для boom с socket)
          this.conecterMouth.x = proj.x;
          this.conecterMouth.y = proj.y;

          this.thrownConnecter = proj;
        }

        spawnConnecter() {
          if (this.conecters.countActive(true) > 0 || this.human.hasConnecter)
            return;
          const x = Phaser.Math.Between(80, 720);
          const item = this.conecters.create(x, 575, "conecter");
          item.setOrigin(0.5, 1).setScale(0.18);
          item.body.allowGravity = false;
          // Исчезает через 10 секунд если не подобран
          this.time.delayedCall(10000, () => {
            if (item && item.active) item.destroy();
          });
        }

        updateConnecter() {
          if (!this.carriedConnecter) return;

          // Подбор conecter игроком
          if (!this.human.hasConnecter) {
            this.conecters.getChildren().forEach((item) => {
              if (!item.active) return;
              if (
                Phaser.Geom.Intersects.RectangleToRectangle(
                  this.human.getBounds(),
                  item.getBounds(),
                )
              ) {
                item.destroy();
                this.human.hasConnecter = true;
                this.carriedConnecter.setVisible(true);
                // Через 8 секунд conecter пропадает сам
                this.conecterTimer = this.time.delayedCall(8000, () => {
                  this.human.hasConnecter = false;
                  this.carriedConnecter.setVisible(false);
                  this.conecterMouth.x = -999;
                  this.conecterMouth.y = -999;
                });
              }
            });
          }

          // ── Conecter следует за игроком ──────────────────────────────
          if (this.human.hasConnecter) {
            const vel = this.human.body.velocity;

            // Позиция со смещением по стороне движения (как гриб)
            const cOffset = this.humanFacing === "left" ? -60 : 60;
            this.carriedConnecter.x = this.human.x + cOffset;
            this.carriedConnecter.y = this.human.y - 130;

            // Мгновенный поворот по направлению движения
            if (vel.x > 10) {
              this.carriedConnecter.angle = 90; // вправо
            } else if (vel.x < -10) {
              this.carriedConnecter.angle = -90; // влево
            } else if (this.isJumping) {
              this.carriedConnecter.angle = 180; // прыжок
            } else {
              this.carriedConnecter.angle = 0; // стоит — исходное
            }

            // Рот conecter — в центре carriedConnecter
            this.conecterMouth.x = this.carriedConnecter.x;
            this.conecterMouth.y = this.carriedConnecter.y;

            // (boom только при броске — см. thrownConnecter ниже)
          } else {
            // Conecter не несут — убираем рот за экран (если нет thrownConnecter)
            if (!this.thrownConnecter) {
              this.conecterMouth.x = -999;
              this.conecterMouth.y = -999;
            }
          }

          // ── Летящий conecter (после броска) ────────────────────────────
          if (this.thrownConnecter) {
            const p = this.thrownConnecter;

            // Рот снаряда следует за ним
            this.conecterMouth.x = p.x;
            this.conecterMouth.y = p.y;

            // Boom при касании рта снаряда с ртом socket
            if (
              !this.boomCooldown &&
              this.socket &&
              this.socket.active &&
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.conecterMouth.getBounds(),
                this.socketMouth.getBounds(),
              )
            ) {
              this.boomCooldown = true;
              const boomX = (p.x + this.socket.x) / 2;
              const boomY = (p.y + this.socket.y) / 2;
              const boom = this.add.image(boomX, boomY, "boom");
              boom.setScale(0.6);
              boom.setBlendMode(Phaser.BlendModes.ADD);
              boom.setDepth(15);
              this.tweens.add({
                targets: boom,
                scale: { from: 0.2, to: 1.0 },
                alpha: { from: 1, to: 0 },
                duration: 600,
                ease: "Power2",
                onComplete: () => boom.destroy(),
              });
              const kicks = [
                [300, 0],
                [-300, 0],
                [0, 260],
                [0, -260],
              ];
              const kick = Phaser.Math.RND.pick(kicks);
              this.socket.setVelocity(kick[0], kick[1]);
              this.time.delayedCall(800, () => {
                this.boomCooldown = false;
              });
              // -20 HP socket
              this.events.emit("damageSocket4", 20);

              // Уничтожаем снаряд
              p.destroy();
              this.thrownConnecter = null;
              this.conecterMouth.x = -999;
              this.conecterMouth.y = -999;
            }

            // Улетел за экран — уничтожаем
            if (
              p.active &&
              (p.x < -50 || p.x > 850 || p.y < -50 || p.y > 650)
            ) {
              p.destroy();
              this.thrownConnecter = null;
              this.conecterMouth.x = -999;
              this.conecterMouth.y = -999;
            }
          }
        }

        updateDogAI() {
          this.dog.flipX = false;
          if (this.dog.body.velocity.x < 0) {
            this.dog.anims.play("dog_walk_left", true);
          } else if (this.dog.body.velocity.x > 0) {
            this.dog.anims.play("dog_walk_right", true);
          } else {
            this.dog.anims.play("dog_idle", true);
            this.dog.flipX = this.dogDirection === "left";
          }
        }
      }

          this.socketHpBar = this.add
            .rectangle(680, 22, 160, 18, 0x00ff00)
            .setOrigin(0.5);
          this.socketHpTxt = this.add.text(610, 35, "HP: 100%", ts);

          // ── Кнопка меню ────────────────────────────────────────────
          const menuButton = this.add
            .text(750, 55, "📋 Меню", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "18px",
              fill: "#ffffff",
              backgroundColor: "#333333",
              padding: { x: 8, y: 4 },
            })
            .setOrigin(1, 0)
            .setInteractive();
          menuButton.on("pointerover", () =>
            menuButton.setStyle({ fill: "#ffff00" }),
          );
          menuButton.on("pointerout", () =>
            menuButton.setStyle({ fill: "#ffffff" }),
          );
          menuButton.on("pointerdown", () => {
            this.scene.stop("Scene4");
            this.scene.stop("UIScene4");
            this.scene.stop("VirtualControlsScene");
            this.scene.start("MainMenuScene");
          });

          // ── Слушаем события от Scene4 ───────────────────────────────
          const g = this.scene.get("Scene4");
          if (g && g.scene.isActive()) {
            g.events.off("damageHuman4");
            g.events.off("damageSocket4");

            g.events.on("damageHuman4", (dmg) => {
              if (g.isHumanDead) return;
              g.humanHealth = Math.max(0, g.humanHealth - dmg);
              this.updateHumanBar(g.humanHealth);
              // Плавающий текст урона
              const t = this.add
                .text(g.human.x, g.human.y - 160, "-" + dmg, {
                  fontSize: "28px",
                  fontFamily: '"3_Muz-TV2000.ttf"',
                  color: "#ff4444",
                  stroke: "#000",
                  strokeThickness: 4,
                })
                .setOrigin(0.5);
              this.tweens.add({
                targets: t,
                y: t.y - 50,
                alpha: 0,
                duration: 900,
                onComplete: () => t.destroy(),
              });
              if (g.humanHealth <= 0 && !g.isHumanDead) {
                g.isHumanDead = true;
                g.scene.pause();
                this.showResult("ИГРА ОКОНЧЕНА", "#ff0000");
              }
            });

            g.events.on("damageSocket4", (dmg) => {
              if (g.isSocketDead) return;
              g.socketHealth = Math.max(0, g.socketHealth - dmg);
              this.updateSocketBar(g.socketHealth);
              // Плавающий текст урона
              const t = this.add
                .text(g.socket.x, g.socket.y - 80, "-" + dmg, {
                  fontSize: "28px",
                  fontFamily: '"3_Muz-TV2000.ttf"',
                  color: "#ff8800",
                  stroke: "#000",
                  strokeThickness: 4,
                })
                .setOrigin(0.5);
              this.tweens.add({
                targets: t,
                y: t.y - 50,
                alpha: 0,
                duration: 900,
                onComplete: () => t.destroy(),
              });
              if (g.socketHealth <= 0 && !g.isSocketDead) {
                g.isSocketDead = true;
                g.socket.setVelocity(0, 0);
                g.socket.anims.stop();
                g.socket.setTint(0x333333);
                g.scene.pause();
                this.showResult("ПОБЕДА!", "#00ff00", true);
              }
            });
          }

          console.log("✅ UIScene4 создан");
        }

        updateHumanBar(hp) {
          const h = Math.max(0, hp);
          this.humanHpBar.width = (h / 100) * 160;
          this.humanHpBar.setFillStyle(
            h > 60 ? 0x00ff00 : h > 30 ? 0xffff00 : 0xff0000,
          );
          this.humanHpTxt.setText("HP: " + h + "%");
        }

        updateSocketBar(hp) {
          const h = Math.max(0, hp);
          this.socketHpBar.width = (h / 100) * 160;
          this.socketHpBar.setFillStyle(
            h > 60 ? 0x00ff00 : h > 30 ? 0xffff00 : 0xff0000,
          );
          this.socketHpTxt.setText("HP: " + h + "%");
        }

        showResult(msg, color, victory) {
          const txt = this.add
            .text(400, 300, msg, {
              fontSize: "120px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: color,
              stroke: "#000000",
              strokeThickness: 10,
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: txt,
            alpha: { from: 0, to: 1 },
            scale: { from: 0.5, to: 1.0 },
            duration: 600,
            ease: "Back.easeOut",
          });
          this.time.delayedCall(3000, () => {
            this.scene.stop("Scene4");
            this.scene.stop("UIScene4");
            if (victory) {
              this.scene.start("Scene5");
            } else {
              this.scene.start("MainMenuScene");
            }
          });
        }

        shutdown() {
          const g = this.scene.get("Scene4");
          if (g) {
            g.events.off("damageHuman4");
            g.events.off("damageSocket4");
          }
        }
      }

      // =================================================================
      // SCENE 5: Ринг — после победы над Socket
      // =================================================================
      class Scene5 extends Phaser.Scene {
        constructor() {
          super("Scene5");
        }

        preload() {
          this.load.image("ring", "assets/images/ring.jpg");
        }

        create() {
          // Фон — ринг
          this.add.image(400, 300, "ring").setDisplaySize(800, 600);

          // *** БОЕЦ — спрайт humanFight ***
          this.fighter = this.physics.add.sprite(400, 520, "humanFight");
          this.fighter.setOrigin(0.5, 1);
          this.fighter.body.allowGravity = false;
          this.fighter.setCollideWorldBounds(true);
          this.fighter.setScale(1.5);
          this.fighter.anims.play("fight_idle", true);
          this.fighterFacing = "right";
          this.isAttacking = false; // блокировка во время удара

          // *** РОБОТ — противник ***
          this.robot = this.physics.add.sprite(650, 520, "robot");
          this.robot.setOrigin(0.5, 1);
          this.robot.body.allowGravity = false;
          this.robot.setCollideWorldBounds(true);
          this.robot.setScale(1.5);
          this.robot.body.setSize(86, 224); // 0.5*172 x 0.9*249
          this.robot.anims.play("robot_run", true);
          this.robotAttacking = false; // робот бьёт
          this.robotCooldown = false; // пауза после удара
          this.robotFacing = "left";

          // *** УПРАВЛЕНИЕ ***
          this.cursors = this.input.keyboard.createCursorKeys();
          this.jumpKey = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.SPACE,
          );
          this.prevDown = false;
          this.isJumping = false;

          console.log("🥊 Scene5: Ринг готов!");
        }

        update() {
          const joystickState = this.registry.get("joystickState") || {};
          const isMobile = this.registry.get("isMobile") || false;

          const leftPressed =
            this.cursors.left.isDown || (isMobile && joystickState.left);
          const rightPressed =
            this.cursors.right.isDown || (isMobile && joystickState.right);
          const downNow =
            this.cursors.down.isDown || (isMobile && joystickState.down);
          const downJust = downNow && !this.prevDown;
          this.prevDown = downNow;

          this.updateRobot();

          // ── Прыжок ────────────────────────────────────────────────────
          const jumpPressed =
            Phaser.Input.Keyboard.JustDown(this.jumpKey) ||
            (isMobile && joystickState.isJumping);
          if (jumpPressed && !this.isJumping && !this.isAttacking) {
            this.isJumping = true;
            let jumpVelocityX = 0;
            if (isMobile && joystickState.jumpDirection === "left") {
              jumpVelocityX = -200;
              this.fighter.flipX = true;
              this.fighterFacing = "left";
            } else if (isMobile && joystickState.jumpDirection === "right") {
              jumpVelocityX = 200;
              this.fighter.flipX = false;
              this.fighterFacing = "right";
            } else if (this.cursors.left.isDown) {
              jumpVelocityX = -200;
              this.fighter.flipX = true;
              this.fighterFacing = "left";
            } else if (this.cursors.right.isDown) {
              jumpVelocityX = 200;
              this.fighter.flipX = false;
              this.fighterFacing = "right";
            }
            this.fighter.setVelocityX(jumpVelocityX);
            this.tweens.add({
              targets: this.fighter,
              y: this.fighter.y - 220,
              duration: 380,
              yoyo: true,
              ease: "Power2",
              onComplete: () => {
                this.isJumping = false;
                this.fighter.setVelocityX(0);
              },
            });
          }

          if (this.isJumping) return;

          // ── Удар ──────────────────────────────────────────────────────
          if (downJust && !this.isAttacking) {
            this.isAttacking = true;
            this.fighter.setVelocityX(0);
            const attack = Phaser.Math.RND.pick(["fight_kick", "fight_punch"]);
            this.fighter.anims.play(attack, true);
            this.fighter.once("animationcomplete", () => {
              this.isAttacking = false;
              this.fighter.anims.play("fight_idle", true);
            });
            return;
          }

          if (this.isAttacking) return;

          // ── Движение ─────────────────────────────────────────────────
          if (leftPressed) {
            this.fighter.setVelocityX(-200);
            this.fighter.flipX = true;
            this.fighterFacing = "left";
            this.fighter.anims.play("fight_walk", true);
          } else if (rightPressed) {
            this.fighter.setVelocityX(200);
            this.fighter.flipX = false;
            this.fighterFacing = "right";
            this.fighter.anims.play("fight_walk", true);
          } else {
            this.fighter.setVelocityX(0);
            this.fighter.anims.play("fight_idle", true);
          }
        }

        updateRobot() {
          if (!this.robot || !this.robot.active) return;

          const dx = this.fighter.x - this.robot.x;
          const dist = Math.abs(dx);
          const touchRange = 90; // дистанция для удара

          // Флип робота по направлению к игроку
          if (dx < 0) {
            this.robot.flipX = true;
            this.robotFacing = "left";
          } else {
            this.robot.flipX = false;
            this.robotFacing = "right";
          }

          if (this.robotAttacking) return; // идёт анимация удара

          if (dist <= touchRange) {
            // ── В зоне удара ──────────────────────────────────────────
            if (!this.robotCooldown) {
              this.robotAttacking = true;
              this.robotCooldown = true;
              this.robot.setVelocityX(0);
              const atk = Phaser.Math.RND.pick(["robot_punch", "robot_kick"]);
              this.robot.anims.play(atk, true);
              this.robot.once("animationcomplete", () => {
                this.robotAttacking = false;
                this.robot.anims.play("robot_run", true);
                // Кулдаун 0.8 сек перед следующим ударом
                this.time.delayedCall(800, () => {
                  this.robotCooldown = false;
                });
              });
            } else {
              // Кулдаун — стоим на месте
              this.robot.setVelocityX(0);
              this.robot.anims.play("robot_run", true);
            }
          } else {
            // ── Преследование игрока ──────────────────────────────────
            const speed = 160;
            this.robot.setVelocityX(dx > 0 ? speed : -speed);
            this.robot.anims.play("robot_run", true);
          }
        }
      }

      // =================================================================
      // SCENE 7: ВИРТУАЛЬНЫЙ ДЖОЙСТИК ДЛЯ МОБИЛЬНЫХ
      // =================================================================
      class VirtualControlsScene extends Phaser.Scene {
        constructor() {
          super({ key: "VirtualControlsScene", active: false });
        }

        create() {
          // Проверяем, мобильное ли устройство
          const isMobile =
            /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
              navigator.userAgent,
            ) || window.innerWidth < 768;

          if (!isMobile) {
            console.log("💻 Десктоп - джойстик отключён");
            this.registry.set("isMobile", false);
            return;
          }

          console.log("🕹️ Мобильное устройство - создаём виртуальный джойстик");
          this.registry.set("isMobile", true);

          // Состояние джойстика
          this.joystickState = {
            left: false,
            right: false,
            up: false,
            down: false,
            isJumping: false,
            jumpDirection: null, // 'left', 'right', или null для прыжка на месте
          };

          // Параметры джойстика
          const joystickX = 680; // Позиция в правом нижнем углу
          const joystickY = 500;
          const baseRadius = 60; // Радиус базы джойстика
          const stickRadius = 30; // Радиус стика
          const maxDistance = 40; // Максимальное расстояние стика от центра

          // База джойстика (неподвижный круг)
          this.joystickBase = this.add.circle(
            joystickX,
            joystickY,
            baseRadius,
            0x333333,
            0.3,
          );
          this.joystickBase.setStrokeStyle(3, 0x666666, 0.5);
          this.joystickBase.setScrollFactor(0);

          // Стик джойстика (подвижный круг)
          this.joystickStick = this.add.circle(
            joystickX,
            joystickY,
            stickRadius,
            0x00ff00,
            0.6,
          );
          this.joystickStick.setStrokeStyle(3, 0x00cc00, 0.8);
          this.joystickStick.setScrollFactor(0);

          // Стрелки для визуальной подсказки (8 направлений)
          const arrowStyle = { fontSize: "16px", color: "#666666" };
          this.add
            .text(joystickX, joystickY - baseRadius - 15, "⬆", arrowStyle)
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setAlpha(0.5);
          this.add
            .text(joystickX + baseRadius + 15, joystickY, "➡", arrowStyle)
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setAlpha(0.5);
          this.add
            .text(joystickX, joystickY + baseRadius + 15, "⬇", arrowStyle)
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setAlpha(0.5);
          this.add
            .text(joystickX - baseRadius - 15, joystickY, "⬅", arrowStyle)
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setAlpha(0.5);

          // Переменные для отслеживания
          this.joystickActive = false;
          this.lastJumpTime = 0;
          const minJumpInterval = 500; // Минимальный интервал между прыжками (мс)

          // Создаём интерактивную зону вокруг джойстика
          const joystickZone = this.add.zone(
            joystickX,
            joystickY,
            baseRadius * 3,
            baseRadius * 3,
          );
          joystickZone.setInteractive();
          joystickZone.setScrollFactor(0);

          // Начало касания
          joystickZone.on("pointerdown", (pointer) => {
            this.joystickActive = true;
            this.updateJoystick(
              pointer.x,
              pointer.y,
              joystickX,
              joystickY,
              maxDistance,
            );
          });

          // Движение пальца
          joystickZone.on("pointermove", (pointer) => {
            if (!this.joystickActive) return;
            this.updateJoystick(
              pointer.x,
              pointer.y,
              joystickX,
              joystickY,
              maxDistance,
            );
          });

          // Глобальное движение (если палец уходит за пределы зоны)
          this.input.on("pointermove", (pointer) => {
            if (!this.joystickActive) return;
            this.updateJoystick(
              pointer.x,
              pointer.y,
              joystickX,
              joystickY,
              maxDistance,
            );
          });

          // Отпускание пальца
          const resetJoystick = () => {
            if (!this.joystickActive) return;

            this.joystickActive = false;

            // Возвращаем стик в центр с анимацией
            this.tweens.add({
              targets: this.joystickStick,
              x: joystickX,
              y: joystickY,
              duration: 100,
              ease: "Power2",
            });

            // Сбрасываем состояния
            this.joystickState.left = false;
            this.joystickState.right = false;
            this.joystickState.up = false;
            this.joystickState.down = false;
          };

          joystickZone.on("pointerup", resetJoystick);
          joystickZone.on("pointerout", resetJoystick);
          this.input.on("pointerup", resetJoystick);

          // Сохраняем в registry для доступа из других сцен
          this.registry.set("joystickState", this.joystickState);

          // Визуальная подсказка
          const hint = this.add
            .text(joystickX, joystickY - 100, "Джойстик\nдля управления", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "18px",
              color: "#888888",
              align: "center",
            })
            .setOrigin(0.5)
            .setAlpha(0.6)
            .setScrollFactor(0);

          // Убираем подсказку через 3 секунды
          this.tweens.add({
            targets: hint,
            alpha: 0,
            duration: 1000,
            delay: 3000,
            onComplete: () => hint.destroy(),
          });
        }

        updateJoystick(pointerX, pointerY, centerX, centerY, maxDistance) {
          const deltaX = pointerX - centerX;
          const deltaY = pointerY - centerY;
          const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
          const angle = Math.atan2(deltaY, deltaX);

          // Ограничиваем стик максимальной дистанцией
          let stickX, stickY;
          if (distance > maxDistance) {
            stickX = centerX + Math.cos(angle) * maxDistance;
            stickY = centerY + Math.sin(angle) * maxDistance;
          } else {
            stickX = pointerX;
            stickY = pointerY;
          }

          // Обновляем позицию стика
          this.joystickStick.x = stickX;
          this.joystickStick.y = stickY;

          // Определяем направление (нужна минимальная дистанция для срабатывания)
          const deadZone = 10; // Мёртвая зона в центре

          if (distance > deadZone) {
            // Определяем угол в градусах
            const degrees = angle * (180 / Math.PI);

            // Сбрасываем все направления
            this.joystickState.left = false;
            this.joystickState.right = false;
            this.joystickState.up = false;
            this.joystickState.down = false;

            // Определяем направление по углу (8 направлений)
            // Вправо: -22.5° до 22.5°
            if (degrees >= -22.5 && degrees <= 22.5) {
              this.joystickState.right = true;
            }
            // Вправо-вниз: 22.5° до 67.5°
            else if (degrees > 22.5 && degrees <= 67.5) {
              this.joystickState.right = true;
              this.joystickState.down = true;
            }
            // Вниз: 67.5° до 112.5°
            else if (degrees > 67.5 && degrees <= 112.5) {
              this.joystickState.down = true;
            }
            // Влево-вниз: 112.5° до 157.5°
            else if (degrees > 112.5 && degrees <= 157.5) {
              this.joystickState.left = true;
              this.joystickState.down = true;
            }
            // Влево: 157.5° до 180° или -180° до -157.5°
            else if (degrees > 157.5 || degrees <= -157.5) {
              this.joystickState.left = true;
            }
            // Влево-вверх: -157.5° до -112.5°
            else if (degrees > -157.5 && degrees <= -112.5) {
              this.joystickState.left = true;
              this.joystickState.up = true;
            }
            // Вверх: -112.5° до -67.5°
            else if (degrees > -112.5 && degrees <= -67.5) {
              this.joystickState.up = true;
            }
            // Вправо-вверх: -67.5° до -22.5°
            else if (degrees > -67.5 && degrees <= -22.5) {
              this.joystickState.right = true;
              this.joystickState.up = true;
            }

            // ПРЫЖОК: если джойстик наклонён вверх
            if (this.joystickState.up && !this.joystickState.isJumping) {
              const now = this.time.now;
              if (now - this.lastJumpTime > 500) {
                // Анти-спам прыжков
                this.joystickState.isJumping = true;
                this.lastJumpTime = now;

                // Определяем направление прыжка
                if (this.joystickState.left) {
                  this.joystickState.jumpDirection = "left";
                  console.log("🕹️ Прыжок ВЛЕВО-ВВЕРХ");
                } else if (this.joystickState.right) {
                  this.joystickState.jumpDirection = "right";
                  console.log("🕹️ Прыжок ВПРАВО-ВВЕРХ");
                } else {
                  this.joystickState.jumpDirection = null;
                  console.log("🕹️ Прыжок ВВЕРХ");
                }

                // Сбрасываем прыжок через 100мс
                this.time.delayedCall(100, () => {
                  this.joystickState.isJumping = false;
                  this.joystickState.jumpDirection = null;
                });
              }
            }

            // Визуальная обратная связь - меняем цвет стика
            if (this.joystickState.up) {
              this.joystickStick.setFillStyle(0x00ffff, 0.8); // Голубой для прыжка
            } else if (this.joystickState.down) {
              this.joystickStick.setFillStyle(0xffff00, 0.8); // Жёлтый для "вниз"
            } else {
              this.joystickStick.setFillStyle(0x00ff00, 0.6); // Зелёный для обычного движения
            }
          } else {
            // В мёртвой зоне - сбрасываем всё
            this.joystickState.left = false;
            this.joystickState.right = false;
            this.joystickState.up = false;
            this.joystickState.down = false;
            this.joystickStick.setFillStyle(0x00ff00, 0.6);
          }
        }
      }

      // =================================================================
      // GAME CONFIGURATION
      // =================================================================
      const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        backgroundColor: "#1d1d1d",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
          width: 800,
          height: 600,
        },
        physics: { default: "arcade", arcade: { debug: false } },
        scene: [
          PreloadScene,
          MainMenuScene,
          DifficultySelectScene,
          GameScene,
          UIScene,
          Scene2,
          UIScene2,
          Scene4,
          UIScene4,
          Scene5,
          VirtualControlsScene,
        ],
      };

      window.onload = async () => {
        // Ждём загрузки шрифта перед запуском игры
        try {
          await document.fonts.ready;
          console.log("Шрифты загружены!");
        } catch (error) {
          console.log("Ошибка загрузки шрифтов, запускаем игру в любом случае");
        }

        new Phaser.Game(config);
      };
    </script>
  </body>
</html>
