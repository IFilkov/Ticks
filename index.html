            this.fighterFist.x = -999;
            this.fighterFist.y = -999;
          }
          if (this.robotAttacking) {
            const dir = this.robotFacing === "right" ? 1 : -1;
            this.robotFist.x = this.robot.x + dir * 80;
            this.robotFist.y = this.robot.y - 120;
          } else {
            this.robotFist.x = -999;
            this.robotFist.y = -999;
          }
        }
        checkHits() {
          if (
            !this.fighterHitCooldown &&
            this.isAttacking &&
            Phaser.Geom.Intersects.RectangleToRectangle(
              this.fighterFist.getBounds(),
              this.robot.getBounds(),
            )
          ) {
            this.fighterHitCooldown = true;
            const base = Phaser.Math.Between(0, 5);
            const final = this.calcFighterDamage(base);
            this.sound.play(Phaser.Math.RND.pick(["hit2", "hit3"]), {
              volume: 0.8,
            });
            this.applyDamage("robot", final);
            const kbR = this.robot.x > this.fighter.x ? 1 : -1;
            this.robot.setVelocityX(kbR * 300);
            this.time.delayedCall(200, () => {
              if (this.robot) this.robot.setVelocityX(0);
            });
            this.time.delayedCall(400, () => {
              this.fighterHitCooldown = false;
            });
          }
          if (
            !this.robotHitCooldown &&
            this.robotAttacking &&
            Phaser.Geom.Intersects.RectangleToRectangle(
              this.robotFist.getBounds(),
              this.fighter.getBounds(),
            )
          ) {
            this.robotHitCooldown = true;
            this.sound.play(Phaser.Math.RND.pick(["hit2", "hit3"]), {
              volume: 0.8,
            });
            this.applyDamage("fighter", Phaser.Math.Between(0, 20));
            const kbF = this.fighter.x > this.robot.x ? 1 : -1;
            this.fighter.setVelocityX(kbF * 300);
            this.time.delayedCall(200, () => {
              if (this.fighter) this.fighter.setVelocityX(0);
            });
            this.time.delayedCall(400, () => {
              this.robotHitCooldown = false;
            });
          }
        }
        applyDamage(target, dmg) {
          if (target === "robot") {
            if (this.robotDead) return;
            this.robotHP = Math.max(0, this.robotHP - dmg);
            this.robotHpBar.width = (this.robotHP / 100) * 160;
            this.robotHpBar.setFillStyle(
              this.robotHP > 60
                ? 0xff4400
                : this.robotHP > 30
                  ? 0xffaa00
                  : 0xff0000,
            );
            this.robotHpTxt.setText("HP:" + this.robotHP);
            this.robot.setTint(0xff0000);
            this.time.delayedCall(150, () => {
              if (this.robot) this.robot.clearTint();
            });
            const t = this.add
              .text(this.robot.x, this.robot.y - 260, "-" + dmg, {
                fontSize: "28px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color: "#ff4400",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5)
              .setDepth(30);
            this.tweens.add({
              targets: t,
              y: t.y - 40,
              alpha: 0,
              duration: 700,
              onComplete: () => t.destroy(),
            });
            if (this.robotHP <= 0) {
              this.robotDead = true;
              this.endFight("win");
            }
          } else {
            if (this.fighterDead) return;
            this.fighterHP = Math.max(0, this.fighterHP - dmg);
            this.fighterHpBar.width = (this.fighterHP / 100) * 160;
            this.fighterHpBar.setFillStyle(
              this.fighterHP > 60
                ? 0x00ff00
                : this.fighterHP > 30
                  ? 0xffff00
                  : 0xff0000,
            );
            this.fighterHpTxt.setText("HP:" + this.fighterHP);
            this.fighter.setTint(0xff0000);
            this.time.delayedCall(150, () => {
              if (this.fighter) this.fighter.clearTint();
            });
            const t = this.add
              .text(this.fighter.x, this.fighter.y - 260, "-" + dmg, {
                fontSize: "28px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color: "#ff0000",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5)
              .setDepth(30);
            this.tweens.add({
              targets: t,
              y: t.y - 40,
              alpha: 0,
              duration: 700,
              onComplete: () => t.destroy(),
            });
            if (this.fighterHP <= 0) {
              this.fighterDead = true;
              this.endFight("lose");
            }
          }
        }
        healTarget(target, amount) {
          if (target === "fighter") {
            if (this.fighterHP >= 100) return;
            this.fighterHP = Math.min(100, this.fighterHP + amount);
            this.fighterHpBar.width = (this.fighterHP / 100) * 160;
            this.fighterHpBar.setFillStyle(
              this.fighterHP > 60
                ? 0x00ff00
                : this.fighterHP > 30
                  ? 0xffff00
                  : 0xff0000,
            );
            this.fighterHpTxt.setText("HP:" + this.fighterHP);
          } else {
            if (this.robotHP >= 100) return;
            this.robotHP = Math.min(100, this.robotHP + amount);
            this.robotHpBar.width = (this.robotHP / 100) * 160;
            this.robotHpBar.setFillStyle(
              this.robotHP > 60
                ? 0xff4400
                : this.robotHP > 30
                  ? 0xffaa00
                  : 0xff0000,
            );
            this.robotHpTxt.setText("HP:" + this.robotHP);
          }
        }
        calcFighterDamage(base) {
          if (this.fighterHP > 20) return base;
          let dmg = base * 5;
          const critChance = 0.2 + ((20 - this.fighterHP) / 20) * 0.15;
          if (Math.random() < critChance) {
            dmg = base * 10;
            // ── Звук крита ────────────────────────────────────────────
            this.sound.play("krit", { volume: 1.0 });
            const c = this.add
              .text(this.robot.x, this.robot.y - 300, "КРИТ!", {
                fontSize: "40px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color: "#ffff00",
                stroke: "#ff0000",
                strokeThickness: 6,
              })
              .setOrigin(0.5)
              .setDepth(35);
            this.tweens.add({
              targets: c,
              y: c.y - 60,
              alpha: 0,
              scale: 1.5,
              duration: 800,
              ease: "Power2",
              onComplete: () => c.destroy(),
            });
          }
          if (!this.rageActive) {
            this.rageActive = true;
            // ── Звук ярости ───────────────────────────────────────────
            this.sound.play("rage", { volume: 0.9 });
            this.rageIcon = this.add
              .text(400, 80, "🔥 ЯРОСТЬ! 🔥", {
                fontSize: "36px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color: "#ff4400",
                stroke: "#000",
                strokeThickness: 5,
              })
              .setOrigin(0.5)
              .setDepth(35);
            this.tweens.add({
              targets: this.rageIcon,
              alpha: { from: 0, to: 1 },
              scale: { from: 0.5, to: 1.2 },
              duration: 400,
              ease: "Back.easeOut",
              yoyo: true,
              repeat: 2,
            });
            this.fighterHpBar.setFillStyle(0xff0000);
          }
          return Math.round(dmg);
        }
        endFight(result) {
          if (this.bgm) this.bgm.stop();
          this.robot.setVelocity(0, 0);
          this.fighter.setVelocity(0, 0);
          this.fighterDead = true;
          this.robotDead = true;
          if (result === "win") {
            this.robot.setVisible(false);
            this.sound.play("boom_snd", { volume: 1.0 });
            [
              { x: this.robot.x, y: this.robot.y - 150, s: 1.2 },
              { x: this.robot.x - 50, y: this.robot.y - 80, s: 0.8 },
              { x: this.robot.x + 40, y: this.robot.y - 200, s: 0.9 },
            ].forEach((b, i) => {
              this.time.delayedCall(i * 180, () => {
                const bm = this.add.image(b.x, b.y, "boom");
                bm.setScale(0.1)
                  .setBlendMode(Phaser.BlendModes.ADD)
                  .setDepth(25);
                this.tweens.add({
                  targets: bm,
                  scale: { from: 0.1, to: b.s },
                  alpha: { from: 1, to: 0 },
                  duration: 600,
                  ease: "Power2",
                  onComplete: () => bm.destroy(),
                });
              });
            });
          } else {
            this.sound.play("knockout", { volume: 1.0 });
            const dy = this.fighter.y,
              dx = this.fighter.x;
            this.tweens.killTweensOf(this.fighter);
            this.fighter.anims.stop();
            this.fighter.body.setVelocity(0, 0);
            this.fighter.body.setEnable(false);
            this.isJumping = false;
            this.fighter.setAngle(90);
            this.fighter.x = dx;
            this.fighter.y = dy;
          }
          const msg = result === "win" ? "ПОБЕДА!" : "НОКАУТ!";
          const color = result === "win" ? "#00ff00" : "#ff0000";
          this.time.delayedCall(result === "win" ? 600 : 200, () => {
            const txt = this.add
              .text(400, 280, msg, {
                fontSize: "120px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color,
                stroke: "#000000",
                strokeThickness: 12,
              })
              .setOrigin(0.5)
              .setDepth(40);
            this.tweens.add({
              targets: txt,
              alpha: { from: 0, to: 1 },
              scale: { from: 0.4, to: 1 },
              duration: 500,
              ease: "Back.easeOut",
            });
          });
          this.time.delayedCall(3500, () => {
            this.scene.start("MainMenuScene");
          });
        }
        shutdown() {
          if (this.bgm) this.bgm.stop();
        }
        updateRobot() {
          if (!this.robot || !this.robot.active) return;
          const dx = this.fighter.x - this.robot.x;
          const dist = Math.abs(dx);
          const stopGap = 120;
          const touchRange = stopGap + 20;
          if (dx < 0) {
            this.robot.flipX = true;
            this.robotFacing = "left";
          } else {
            this.robot.flipX = false;
            this.robotFacing = "right";
          }
          if (this.robotAttacking) return;
          if (dist <= touchRange) {
            if (!this.robotCooldown) {
              this.robotAttacking = true;
              this.robotCooldown = true;
              this.robot.setVelocityX(0);
              const atk = Phaser.Math.RND.pick(["robot_punch", "robot_kick"]);
              this.robot.anims.play(atk, true);
              this.robot.once("animationcomplete", () => {
                this.robotAttacking = false;
                this.robot.anims.play("robot_run", true);
                this.time.delayedCall(800, () => {
                  this.robotCooldown = false;
                });
              });
            } else {
              this.robot.setVelocityX(0);
              this.robot.anims.play("robot_run", true);
            }
          } else if (dist > stopGap) {
            const speed = 160;
            this.robot.setVelocityX(dx > 0 ? speed : -speed);
            this.robot.anims.play("robot_run", true);
          } else {
            this.robot.setVelocityX(0);
            this.robot.anims.play("robot_run", true);
          }
        }
      }

      // =================================================================
      // VIRTUAL CONTROLS
      // =================================================================
      class VirtualControlsScene extends Phaser.Scene {
        constructor() {
          super({ key: "VirtualControlsScene", active: false });
        }
        create() {
          const isMobile =
            /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
              navigator.userAgent,
            ) || window.innerWidth < 768;
          if (!isMobile) {
            this.registry.set("isMobile", false);
            return;
          }
          this.registry.set("isMobile", true);
          this.joystickState = {
            left: false,
            right: false,
            up: false,
            down: false,
            isJumping: false,
            jumpDirection: null,
          };
          const jx = 680,
            jy = 500,
            br = 60,
            sr = 30,
            md = 40;
          this.joystickBase = this.add.circle(jx, jy, br, 0x333333, 0.3);
          this.joystickBase.setStrokeStyle(3, 0x666666, 0.5);
          this.joystickBase.setScrollFactor(0);
          this.joystickStick = this.add.circle(jx, jy, sr, 0x00ff00, 0.6);
          this.joystickStick.setStrokeStyle(3, 0x00cc00, 0.8);
          this.joystickStick.setScrollFactor(0);
          const as = { fontSize: "16px", color: "#666666" };
          [
            { t: "⬆", x: jx, y: jy - br - 15 },
            { t: "➡", x: jx + br + 15, y: jy },
            { t: "⬇", x: jx, y: jy + br + 15 },
            { t: "⬅", x: jx - br - 15, y: jy },
          ].forEach((a) =>
            this.add
              .text(a.x, a.y, a.t, as)
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setAlpha(0.5),
          );
          this.joystickActive = false;
          this.lastJumpTime = 0;
          const zone = this.add.zone(jx, jy, br * 3, br * 3);
          zone.setInteractive();
          zone.setScrollFactor(0);
          zone.on("pointerdown", (p) => {
            this.joystickActive = true;
            this.updateJoystick(p.x, p.y, jx, jy, md);
          });
          zone.on("pointermove", (p) => {
            if (!this.joystickActive) return;
            this.updateJoystick(p.x, p.y, jx, jy, md);
          });
          this.input.on("pointermove", (p) => {
            if (!this.joystickActive) return;
            this.updateJoystick(p.x, p.y, jx, jy, md);
          });
          const reset = () => {
            if (!this.joystickActive) return;
            this.joystickActive = false;
            this.tweens.add({
              targets: this.joystickStick,
              x: jx,
              y: jy,
              duration: 100,
              ease: "Power2",
            });
            this.joystickState.left = false;
            this.joystickState.right = false;
            this.joystickState.up = false;
            this.joystickState.down = false;
          };
          zone.on("pointerup", reset);
          zone.on("pointerout", reset);
          this.input.on("pointerup", reset);
          this.registry.set("joystickState", this.joystickState);
          const hint = this.add
            .text(jx, jy - 100, "Джойстик\nдля управления", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "18px",
              color: "#888888",
              align: "center",
            })
            .setOrigin(0.5)
            .setAlpha(0.6)
            .setScrollFactor(0);
          this.tweens.add({
            targets: hint,
            alpha: 0,
            duration: 1000,
            delay: 3000,
            onComplete: () => hint.destroy(),
          });
        }
        updateJoystick(px, py, cx, cy, md) {
          const dx = px - cx,
            dy = py - cy,
            dist = Math.sqrt(dx * dx + dy * dy),
            angle = Math.atan2(dy, dx);
          let sx, sy;
          if (dist > md) {
            sx = cx + Math.cos(angle) * md;
            sy = cy + Math.sin(angle) * md;
          } else {
            sx = px;
            sy = py;
          }
          this.joystickStick.x = sx;
          this.joystickStick.y = sy;
          const dz = 10;
          if (dist > dz) {
            const deg = angle * (180 / Math.PI);
            this.joystickState.left = false;
            this.joystickState.right = false;
            this.joystickState.up = false;
            this.joystickState.down = false;
            if (deg >= -22.5 && deg <= 22.5) this.joystickState.right = true;
            else if (deg > 22.5 && deg <= 67.5) {
              this.joystickState.right = true;
              this.joystickState.down = true;
            } else if (deg > 67.5 && deg <= 112.5)
              this.joystickState.down = true;
            else if (deg > 112.5 && deg <= 157.5) {
              this.joystickState.left = true;
              this.joystickState.down = true;
            } else if (deg > 157.5 || deg <= -157.5)
              this.joystickState.left = true;
            else if (deg > -157.5 && deg <= -112.5) {
              this.joystickState.left = true;
              this.joystickState.up = true;
            } else if (deg > -112.5 && deg <= -67.5)
              this.joystickState.up = true;
            else if (deg > -67.5 && deg <= -22.5) {
              this.joystickState.right = true;
              this.joystickState.up = true;
            }
            if (this.joystickState.up && !this.joystickState.isJumping) {
              const now = this.time.now;
              if (now - this.lastJumpTime > 500) {
                this.joystickState.isJumping = true;
                this.lastJumpTime = now;
                if (this.joystickState.left)
                  this.joystickState.jumpDirection = "left";
                else if (this.joystickState.right)
                  this.joystickState.jumpDirection = "right";
                else this.joystickState.jumpDirection = null;
                this.time.delayedCall(100, () => {
                  this.joystickState.isJumping = false;
                  this.joystickState.jumpDirection = null;
                });
              }
            }
            if (this.joystickState.up)
              this.joystickStick.setFillStyle(0x00ffff, 0.8);
            else if (this.joystickState.down)
              this.joystickStick.setFillStyle(0xffff00, 0.8);
            else this.joystickStick.setFillStyle(0x00ff00, 0.6);
          } else {
            this.joystickState.left = false;
            this.joystickState.right = false;
            this.joystickState.up = false;
            this.joystickState.down = false;
            this.joystickStick.setFillStyle(0x00ff00, 0.6);
          }
        }
      }

      // =================================================================
      // CONFIG
      // =================================================================
      const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        backgroundColor: "#1d1d1d",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
          width: 800,
          height: 600,
        },
        physics: { default: "arcade", arcade: { debug: false } },
        scene: [
          PreloadScene,
          MainMenuScene,
          DifficultySelectScene,
          SceneSelectScene,
          GameScene,
          UIScene,
          Scene2,
          UIScene2,
          Scene4,
          UIScene4,
          Scene5,
          VirtualControlsScene,
        ],
      };
      window.onload = async () => {
        try {
          await document.fonts.ready;
        } catch (e) {}
        new Phaser.Game(config);
      };
    </script>
