<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Tick Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      @font-face {
        font-family: "3_Muz-TV2000.ttf";
        src: url("assets/fonts/3_Muz-TV2000.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #1d1d1d;
      }
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      @media (max-width: 768px) {
        canvas {
          border: none;
        }
      }
    </style>
  </head>
  <body>
    <script>
      // =================================================================
      // SCENE 1: PRELOAD
      // =================================================================
      class PreloadScene extends Phaser.Scene {
        constructor() {
          super("PreloadScene");
        }
        preload() {
          const assetPath = "assets/images/";
          this.load.spritesheet("player", `${assetPath}player_sprite.png`, {
            frameWidth: 216,
            frameHeight: 312,
          });
          this.load.spritesheet("dog_sprite", `${assetPath}dog_sprite.png`, {
            frameWidth: 195,
            frameHeight: 128,
          });
          this.load.spritesheet("homeless", `${assetPath}homeless_sprite.png`, {
            frameWidth: 216,
            frameHeight: 312,
          });
          this.load.image("tick", `${assetPath}tick.png`);
          this.load.image("sky", `${assetPath}sky.jpg`);
          this.load.image("background", `${assetPath}background.png`);
          this.load.image("background2", `${assetPath}background2.png`);
          this.load.image("mushroom", `${assetPath}mushroom.png`);
          this.load.spritesheet("socket", `${assetPath}socket.png`, {
            frameWidth: 512,
            frameHeight: 512,
          });
          this.load.image("conecter", `${assetPath}conecter.png`);
          this.load.spritesheet("flash", `${assetPath}flash.png`, {
            frameWidth: 281,
            frameHeight: 307,
          });
          this.load.image("boom", `${assetPath}boom.png`);
          this.load.spritesheet("humanFight", `${assetPath}humanFight.png`, {
            frameWidth: 172,
            frameHeight: 249,
          });
          this.load.spritesheet("robot", `${assetPath}robot.png`, {
            frameWidth: 172,
            frameHeight: 249,
          });
          // ── Звуки ──────────────────────────────────────────────────────
          this.load.audio(
            "bark_aggressive",
            "assets/audio/bark_aggressive.mp3",
          );
          this.load.audio("groan1", "assets/audio/groan1.mp3");
          this.load.audio("bark", "assets/audio/bark.mp3");
          this.load.audio("eat", "assets/audio/eat.mp3");
          this.load.audio("hit2", "assets/audio/hit2.mp3");
          this.load.audio("hit3", "assets/audio/hit3.mp3");
          this.load.audio("tok", "assets/audio/tok.mp3");
          this.load.audio("boom_snd", "assets/audio/boom.mp3");
          this.load.audio("knockout", "assets/audio/knockout.mp3");
          this.load.audio("rage", "assets/audio/rage.mp3");
          this.load.audio("krit", "assets/audio/krit.mp3");
          // ── Фоновые треки ───────────────────────────────────────
          this.load.audio("bomj", "assets/audio/bomj.mp3");
          this.load.audio("fon_menu", "assets/audio/menu.mp3");
          this.load.audio("fon1", "assets/audio/fon1.mp3");
          this.load.audio("fon2", "assets/audio/fon2.mp3");
          this.load.audio("fon3", "assets/audio/fon3.mp3");
        }
        create() {
          this.createAllAnimations();
          this.scene.start("MainMenuScene");
        }
        createAllAnimations() {
          const a = (key, tex, s, e, fps, rep) => {
            if (!this.anims.exists(key))
              this.anims.create({
                key,
                frames: this.anims.generateFrameNumbers(tex, {
                  start: s,
                  end: e,
                }),
                frameRate: fps,
                repeat: rep,
              });
          };
          a("human_walk", "player", 4, 11, 10, -1);
          a("human_idle", "player", 0, 3, 5, -1);
          a("human_death", "player", 12, 15, 10, 0);
          a("dog_idle", "dog_sprite", 0, 3, 5, -1);
          a("dog_walk_right", "dog_sprite", 12, 15, 10, -1);
          a("dog_walk_left", "dog_sprite", 5, 7, 10, -1);
          a("dog_jump", "dog_sprite", 12, 15, 12, 0);
          a("dog_death", "dog_sprite", 0, 0, 1, 0);
          a("menu_human_walk", "player", 4, 11, 10, -1);
          a("menu_human_idle", "player", 0, 3, 5, -1);
          a("menu_dog_idle", "dog_sprite", 0, 3, 5, -1);
          a("menu_dog_walk_right", "dog_sprite", 12, 15, 10, -1);
          a("menu_dog_walk_left", "dog_sprite", 5, 7, 10, -1);
          a("homeless_idle", "homeless", 0, 3, 5, -1);
          a("homeless_walk", "homeless", 4, 7, 10, -1);
          a("homeless_run", "homeless", 4, 7, 14, -1);
          a("homeless_death", "homeless", 8, 11, 8, 0);
          a("homeless_victory", "homeless", 12, 15, 8, -1);
          a("socket_fly", "socket", 0, 3, 6, -1);
          a("fight_idle", "humanFight", 0, 3, 5, -1);
          a("fight_walk", "humanFight", 4, 7, 10, -1);
          a("fight_kick", "humanFight", 8, 11, 12, 0);
          a("fight_punch", "humanFight", 12, 15, 12, 0);
          a("robot_run", "robot", 0, 7, 12, -1);
          a("robot_punch", "robot", 8, 11, 12, 0);
          a("robot_kick", "robot", 12, 15, 12, 0);
          a("flash_anim", "flash", 0, 7, 16, 0);
        }
      }

      // =================================================================
      // MAIN MENU
      // =================================================================
      class MainMenuScene extends Phaser.Scene {
        constructor() {
          super("MainMenuScene");
        }
        create() {
          this.registry.set("difficulty", null);
          this.registry.set("damageMultiplier", 1);
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");
          this.add
            .text(400, 200, "Клещ", {
              fontSize: "200px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#eb1717",
            })
            .setOrigin(0.5)
            .setShadow(2, 2, "#000000", 2, true, true);
          // ── Фоновая музыка меню ────────────────────────────────
          if (this.sound.get("fon_menu")) {
            this.sound.stopByKey("fon_menu");
          }
          this.sound.stopAll();
          this.bgm = this.sound.add("fon_menu", { loop: true, volume: 0.25 });
          this.bgm.play();

          const btn = this.add
            .text(400, 350, "Старт", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "82px",
              color: "#00ff00",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setInteractive();
          btn.on("pointerover", () => btn.setStyle({ fill: "#ff0" }));
          btn.on("pointerout", () => btn.setStyle({ fill: "#00ff00" }));
          btn.on("pointerdown", () => {
            if (this.bgm) this.bgm.stop();
            this.scene.start("DifficultySelectScene");
          });
          this.human = this.physics.add.sprite(100, 580, "player");
          this.human.setOrigin(0.5, 1).body.allowGravity = false;
          this.humanDirection = 1;
          this.humanPaused = false;
          this.time.addEvent({
            delay: 6000,
            loop: true,
            callback: () => {
              this.humanPaused = true;
              this.time.delayedCall(4000, () => {
                this.humanPaused = false;
              });
            },
          });
          this.dog = this.physics.add.sprite(700, 580, "dog_sprite");
          this.dog.setCollideWorldBounds(true);
          this.dog.setOrigin(0.5, 1).body.allowGravity = false;
          this.dogDirection = "left";
          this.time.addEvent({
            delay: Phaser.Math.Between(1000, 3000),
            loop: true,
            callback: () => {
              const a = Phaser.Math.RND.pick(["left", "right", "idle"]);
              if (a === "left") {
                this.dog.setVelocityX(-100);
                this.dogDirection = "left";
              } else if (a === "right") {
                this.dog.setVelocityX(100);
                this.dogDirection = "right";
              } else this.dog.setVelocityX(0);
            },
          });
        }
        update() {
          this.updateHumanAI();
          this.updateDogAI();
        }
        updateDogAI() {
          this.dog.flipX = false;
          if (this.dog.body.velocity.x < 0)
            this.dog.anims.play("menu_dog_walk_left", true);
          else if (this.dog.body.velocity.x > 0)
            this.dog.anims.play("menu_dog_walk_right", true);
          else {
            this.dog.anims.play("menu_dog_idle", true);
            this.dog.flipX = this.dogDirection === "left";
          }
        }
        updateHumanAI() {
          if (this.humanPaused) {
            this.human.setVelocityX(0);
            this.human.anims.play("menu_human_idle", true);
            return;
          }
          if (this.human.x >= 760) this.humanDirection = -1;
          else if (this.human.x <= 40) this.humanDirection = 1;
          this.human.setVelocityX(100 * this.humanDirection);
          this.human.flipX = this.human.body.velocity.x < 0;
          this.human.anims.play("menu_human_walk", true);
        }
      }

      // =================================================================
      // DIFFICULTY SELECT
      // =================================================================
      class DifficultySelectScene extends Phaser.Scene {
        constructor() {
          super("DifficultySelectScene");
        }
        create() {
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");
          this.add
            .text(400, 150, "Выберите сложность", {
              fontSize: "64px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#ffffff",
            })
            .setOrigin(0.5)
            .setShadow(3, 3, "#000000", 5, true, true);
          const makeBtn = (
            x,
            y,
            label,
            color,
            hcolor,
            hint,
            hintColor,
            difficulty,
            mult,
          ) => {
            const btn = this.add
              .text(x, y, label, {
                fontFamily: '"3_Muz-TV2000.ttf"',
                fontSize: "60px",
                color,
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setInteractive();
            btn.on("pointerover", () => btn.setStyle({ fill: hcolor }));
            btn.on("pointerout", () => btn.setStyle({ fill: color }));
            btn.on("pointerdown", () => {
              this.registry.set("difficulty", difficulty);
              this.registry.set("damageMultiplier", mult);
              this.scene.start("SceneSelectScene");
            });
            this.add
              .text(x, y + 60, hint, {
                fontSize: "24px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color: hintColor,
              })
              .setOrigin(0.5);
          };
          makeBtn(
            400,
            280,
            "Нормальный",
            "#00ff00",
            "#ff0",
            "Обычный урон от клещей",
            "#aaaaaa",
            "normal",
            1,
          );
          makeBtn(
            400,
            420,
            "Хардкор",
            "#ff0000",
            "#ff00ff",
            "Урон от клещей x2!",
            "#ff6666",
            "hardcore",
            2,
          );
        }
      }

      // =================================================================
      // SCENE SELECT
      // =================================================================
      class SceneSelectScene extends Phaser.Scene {
        constructor() {
          super("SceneSelectScene");
        }
        create() {
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");
          const diff = this.registry.get("difficulty");
          this.add
            .text(400, 80, "Выберите сцену", {
              fontSize: "56px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#ffffff",
            })
            .setOrigin(0.5)
            .setShadow(3, 3, "#000", 5, true, true);
          this.add
            .text(
              400,
              140,
              `Сложность: ${diff === "hardcore" ? "ХАРДКОР" : "НОРМАЛЬНЫЙ"}`,
              {
                fontSize: "24px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color: diff === "hardcore" ? "#ff4444" : "#44ff44",
              },
            )
            .setOrigin(0.5);
          const scenes = [
            {
              label: "Фаза 1: Клещи",
              sub: "Собака ловит клещей",
              start: () => {
                this.scene.start("GameScene");
                this.scene.launch("UIScene");
                this.scene.launch("VirtualControlsScene");
              },
            },
            {
              label: "Фаза 2: Человек",
              sub: "Человек против бомжа",
              start: () => {
                this.scene.start("Scene2");
                this.scene.launch("UIScene2");
                this.scene.launch("VirtualControlsScene");
              },
            },
            {
              label: "Фаза 3: Розетка",
              sub: "Кидай конектер в розетку",
              start: () => {
                this.scene.start("Scene4");
                this.scene.launch("UIScene4");
                this.scene.launch("VirtualControlsScene");
              },
            },
            {
              label: "Фаза 4: Ринг",
              sub: "Бой с роботом",
              start: () => {
                this.scene.start("Scene5");
                this.scene.launch("VirtualControlsScene");
              },
            },
          ];
          scenes.forEach((s, i) => {
            const y = 210 + i * 90;
            const b = this.add
              .text(400, y, s.label, {
                fontSize: "46px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color: "#00ff00",
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setInteractive();
            this.add
              .text(400, y + 32, s.sub, {
                fontSize: "20px",
                fontFamily: '"3_Muz-TV2000.ttf"',
                color: "#aaaaaa",
              })
              .setOrigin(0.5);
            b.on("pointerover", () => b.setStyle({ fill: "#ffff00" }));
            b.on("pointerout", () => b.setStyle({ fill: "#00ff00" }));
            b.on("pointerdown", () => s.start());
          });
          const back = this.add
            .text(400, 575, "← Назад", {
              fontSize: "26px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#888888",
            })
            .setOrigin(0.5)
            .setInteractive();
          back.on("pointerover", () => back.setStyle({ fill: "#ffffff" }));
          back.on("pointerout", () => back.setStyle({ fill: "#888888" }));
          back.on("pointerdown", () =>
            this.scene.start("DifficultySelectScene"),
          );
        }
      }

      // =================================================================
      // GAME SCENE (Фаза 1)
      // =================================================================
      class GameScene extends Phaser.Scene {
        constructor() {
          super("GameScene");
        }
        create() {
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");
          this.dog = this.physics.add.sprite(200, 580, "dog_sprite");
          this.dog.setOrigin(0.5, 1);
          this.dog.body.allowGravity = false;
          this.dog.setCollideWorldBounds(true);
          this.dog.hasMushroom = false;
          this.mouth = this.add.zone(0, 0, 60, 60);
          this.physics.world.enable(this.mouth);
          this.mouth.body.setAllowGravity(false);
          this.carriedMushroom = this.add
            .sprite(0, 0, "mushroom")
            .setScale(0.1)
            .setVisible(false);
          this.human = this.physics.add.sprite(100, 580, "player");
          this.human.setOrigin(0.5, 1);
          this.human.body.allowGravity = false;
          this.human.body.setSize(
            this.human.width * 0.5,
            this.human.height * 0.9,
          );
          this.humanHealth = 100;
          this.humanSpeed = 100;
          this.humanDirection = 1;
          this.humanPaused = false;
          this.isHumanDead = false;
          this.time.addEvent({
            delay: 6000,
            loop: true,
            callback: () => {
              this.humanPaused = true;
              this.time.delayedCall(4000, () => {
                this.humanPaused = false;
              });
            },
          });
          this.cursors = this.input.keyboard.createCursorKeys();
          this.jumpKey = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.SPACE,
          );
          this.isJumping = false;
          this.ticks = this.physics.add.group();
          this.mushrooms = this.physics.add.group();
          this.wave = 1;
          this.ticksToSpawn = 5;
          this.spawnInterval = 1500;
          this.startWave();
          this.time.addEvent({
            delay: 10000,
            loop: true,
            callback: this.spawnMushroom,
            callbackScope: this,
          });
        }
        update() {
          if (this.isHumanDead) return;
          this.updateDog();
          this.updateHuman();
          this.updateCollisions();
        }
        spawnMushroom() {
          if (this.mushrooms.countActive(true) > 0) return;
          const x = Phaser.Math.Between(100, 700);
          const mushroom = this.mushrooms.create(x, 580, "mushroom");
          mushroom.setOrigin(0.5, 1).setScale(0.1);
          mushroom.collected = false;
          this.time.delayedCall(
            8000,
            () => {
              if (mushroom.active && !mushroom.collected) mushroom.destroy();
            },
            [],
            this,
          );
        }
        collectMushroom(mouth, mushroom) {
          if (this.dog.hasMushroom) return;
          mushroom.collected = true;
          mushroom.destroy();
          this.dog.hasMushroom = true;
          this.dog.setTint(0x00ff00);
          this.mushroomCarryTimer = this.time.delayedCall(
            8000,
            () => {
              this.dog.hasMushroom = false;
              this.dog.clearTint();
              this.sound.play("eat", { volume: 0.8 });
            },
            [],
            this,
          );
        }
        deliverMushroom() {
          if (!this.dog.hasMushroom) return;
          this.dog.hasMushroom = false;
          this.sound.play("eat", { volume: 0.8 });
          this.events.emit("damageHuman", -20);
          this.dog.clearTint();
          if (this.mushroomCarryTimer) this.mushroomCarryTimer.remove();
        }
        updateDog() {
          const js = this.registry.get("joystickState") || {};
          const mob = this.registry.get("isMobile") || false;
          this.mouth.x = this.dog.body.center.x;
          this.mouth.y = this.dog.body.center.y - 40;
          if (this.dog.hasMushroom) {
            this.carriedMushroom.setVisible(true);
            const off = this.dogFacing === "left" ? -60 : 60;
            this.carriedMushroom.x = this.mouth.x + off;
            this.carriedMushroom.y = this.mouth.y;
            const dp =
              Phaser.Input.Keyboard.JustDown(this.cursors.down) ||
              (mob && js.down);
            if (dp) {
              this.dog.hasMushroom = false;
              this.dog.clearTint();
              if (this.mushroomCarryTimer) this.mushroomCarryTimer.remove();
            }
          } else {
            this.carriedMushroom.setVisible(false);
          }
          const jp =
            Phaser.Input.Keyboard.JustDown(this.jumpKey) ||
            (mob && js.isJumping);
          if (jp && !this.isJumping) {
            this.isJumping = true;
            this.dog.anims.play("dog_jump");
            let vx = 0;
            if (mob && js.jumpDirection) {
              if (js.jumpDirection === "left") {
                vx = -200;
                this.dogFacing = "left";
              } else if (js.jumpDirection === "right") {
                vx = 200;
                this.dogFacing = "right";
              }
            } else {
              if (this.cursors.left.isDown) {
                vx = -200;
                this.dogFacing = "left";
              } else if (this.cursors.right.isDown) {
                vx = 200;
                this.dogFacing = "right";
              }
            }
            this.dog.flipX = this.dogFacing === "left";
            this.dog.setVelocityX(vx);
            this.tweens.add({
              targets: this.dog,
              y: this.dog.y - 280,
              duration: 400,
              yoyo: true,
              ease: "Power2",
              onComplete: () => {
                this.isJumping = false;
                this.dog.setVelocityX(0);
              },
            });
          }
          if (this.isJumping) return;
          const lp = this.cursors.left.isDown || (mob && js.left);
          const rp = this.cursors.right.isDown || (mob && js.right);
          this.dog.flipX = false;
          if (lp) {
            this.dog.setVelocityX(-200);
            this.dog.anims.play("dog_walk_left", true);
            this.dogFacing = "left";
            this._dogGoingRight = false;
          } else if (rp) {
            this.dog.setVelocityX(200);
            if (!this._dogGoingRight) {
              this._dogGoingRight = true;
              if (!this._barkCooldown) {
                this._barkCooldown = true;
                this.sound.play("bark_aggressive", { volume: 0.6 });
                this.time.delayedCall(1500, () => {
                  this._barkCooldown = false;
                });
              }
            }
            this.dog.anims.play("dog_walk_right", true);
            this.dogFacing = "right";
          } else {
            this._dogGoingRight = false;
            this.dog.setVelocityX(0);
            this.dog.anims.play("dog_idle", true);
            this.dog.flipX = this.dogFacing === "left";
          }
        }
        updateHuman() {
          if (this.isHumanDead) return;
          if (this.humanPaused) {
            this.human.setVelocityX(0);
          } else {
            if (this.human.x >= 760) this.humanDirection = -1;
            else if (this.human.x <= 40) this.humanDirection = 1;
            this.human.setVelocityX(this.humanSpeed * this.humanDirection);
          }
          if (this.human.body.velocity.x > 0) {
            this.human.flipX = false;
            this.human.anims.play("human_walk", true);
          } else if (this.human.body.velocity.x < 0) {
            this.human.flipX = true;
            this.human.anims.play("human_walk", true);
          } else this.human.anims.play("human_idle", true);
        }
        updateCollisions() {
          this.ticks.getChildren().forEach((tick) => {
            if (!tick.active) return;
            if (
              !this.dog.hasMushroom &&
              tick.isFalling &&
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.mouth.getBounds(),
                tick.getBounds(),
              )
            ) {
              tick.destroy();
              this.sound.play("bark", { volume: 0.8 });
              return;
            }
            if (
              tick.isFalling &&
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.human.getBounds(),
                tick.getBounds(),
              )
            ) {
              const dm = this.registry.get("damageMultiplier") || 1;
              this.events.emit("damageHuman", 10 * dm);
              this.sound.play("groan1", { volume: 0.7 });
              tick.destroy();
            }
          });
          this.mushrooms.getChildren().forEach((m) => {
            if (!m.active) return;
            if (
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.mouth.getBounds(),
                m.getBounds(),
              )
            )
              this.collectMushroom(this.mouth, m);
          });
          if (
            this.dog.hasMushroom &&
            Phaser.Geom.Intersects.RectangleToRectangle(
              this.dog.getBounds(),
              this.human.getBounds(),
            )
          )
            this.deliverMushroom();
        }
        startWave() {
          if (this.isHumanDead) return;
          this.ticksSpawned = 0;
          this.events.emit("updateWave", this.wave);
          if (this.tickSpawner) this.tickSpawner.remove();
          this.tickSpawner = this.time.addEvent({
            delay: this.spawnInterval,
            loop: true,
            callback: () => {
              if (this.ticksSpawned >= this.ticksToSpawn) {
                this.tickSpawner.remove();
                this.time.delayedCall(2000, () => {
                  this.wave++;
                  if (this.wave > 3) {
                    this.scene.stop("GameScene");
                    this.scene.stop("UIScene");
                    this.scene.stop("VirtualControlsScene");
                    this.scene.start("Scene2");
                    this.scene.launch("UIScene2");
                    this.scene.launch("VirtualControlsScene");
                    return;
                  }
                  this.ticksToSpawn = Math.floor(this.ticksToSpawn * 1.4);
                  this.spawnInterval = Math.max(600, this.spawnInterval - 150);
                  this.startWave();
                });
                return;
              }
              this.spawnTick();
              this.ticksSpawned++;
            },
          });
        }
        spawnTick() {
          if (this.isHumanDead) return;
          const sx = Phaser.Math.Between(50, 750),
            sy = 580,
            py = Phaser.Math.Between(100, 300),
            ex = sx + Phaser.Math.Between(-150, 150);
          const tick = this.ticks.create(sx, sy, "tick");
          if (!tick) return;
          tick.setScale(0.8);
          tick.body.setAllowGravity(false);
          tick.isFalling = false;
          this.tweens.add({
            targets: tick,
            x: ex,
            ease: "Sine.easeInOut",
            duration: Phaser.Math.Between(1200, 1800),
            onUpdate: (tw, t) => {
              const p = tw.progress,
                h = sy - py;
              t.y = sy - 4 * h * p * (1 - p);
              if (!t.isFalling && p > 0.5) t.isFalling = true;
            },
            onComplete: () => {
              if (tick) tick.destroy();
            },
          });
        }
        shutdown() {
          if (this.tickSpawner) this.tickSpawner.remove();
          if (this.mushroomCarryTimer) this.mushroomCarryTimer.remove();
          this.events.off("updateWave");
          this.events.off("damageHuman");
        }
      }

      // =================================================================
      // UI SCENE (Фаза 1)
      // =================================================================
      class UIScene extends Phaser.Scene {
        constructor() {
          super("UIScene");
        }
        create() {
          const ts = {
            fontFamily: "3_Muz-TV2000.ttf",
            fontSize: "16px",
            fill: "#fff",
          };
          this.healthBarBg = this.add
            .rectangle(120, 30, 160, 20, 0x000000)
            .setOrigin(0.5);
          this.healthBar = this.add
            .rectangle(120, 30, 160, 20, 0x00ff00)
            .setOrigin(0.5);
          this.healthText = this.add.text(45, 45, "HP: 100%", ts);
          this.waveText = this.add
            .text(400, 30, "Волна 1", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "24px",
              fill: "#eb8c17",
            })
            .setOrigin(0.5);
          const diff = this.registry.get("difficulty");
          this.add
            .text(750, 15, diff === "hardcore" ? "ХАРДКОР" : "НОРМАЛЬНЫЙ", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "16px",
              fill: diff === "hardcore" ? "#ff0000" : "#00ff00",
            })
            .setOrigin(1, 0);
          const gs = this.scene.get("GameScene");
          if (gs && gs.scene.isActive()) {
            gs.events.off("updateWave");
            gs.events.off("damageHuman");
            gs.events.on("updateWave", (w) => {
              if (this.waveText && this.waveText.active)
                this.waveText.setText(`Волна ${w}`);
            });
            gs.events.on("damageHuman", (dmg) => {
              if (gs.isHumanDead) return;
              gs.humanHealth -= dmg;
              this.updateHealthBar(gs.humanHealth);
              if (dmg > 0) {
                gs.human.setTint(0xff0000);
                gs.time.delayedCall(200, () => {
                  if (gs.human) gs.human.clearTint();
                });
                const t = this.add
                  .text(gs.human.x, gs.human.y - 150, `-${dmg}`, {
                    fontSize: "32px",
                    color: "#ff0000",
                    fontFamily: "3_Muz-TV2000.ttf",
                    stroke: "#000",
                    strokeThickness: 4,
                  })
                  .setOrigin(0.5);
                this.tweens.add({
                  targets: t,
                  y: t.y - 50,
                  alpha: 0,
                  duration: 1000,
                  onComplete: () => t.destroy(),
                });
              } else {
                gs.human.setTint(0x00ff00);
                gs.time.delayedCall(400, () => {
                  if (gs.human) gs.human.clearTint();
                });
                const t = this.add
                  .text(gs.human.x, gs.human.y - 150, `+${Math.abs(dmg)}`, {
                    fontSize: "32px",
                    color: "#00ff00",
                    fontFamily: "3_Muz-TV2000.ttf",
                    stroke: "#000",
                    strokeThickness: 4,
                  })
                  .setOrigin(0.5);
                this.tweens.add({
                  targets: t,
                  y: t.y - 50,
                  alpha: 0,
                  duration: 1000,
                  onComplete: () => t.destroy(),
                });
              }
              if (gs.humanHealth <= 0) {
                gs.isHumanDead = true;
                const h = gs.human;
                h.anims.play("human_death", true);
                h.on(
                  "animationcomplete",
                  () => {
                    h.setVisible(false);
                    const gx = h.x,
                      gy = h.y;
                    this.add
                      .rectangle(gx, gy - 50, 50, 80, 0x222222)
                      .setStrokeStyle(2, 0x000000);
                    this.add
                      .ellipse(gx, gy - 90, 50, 40, 0x222222)
                      .setStrokeStyle(2, 0x000000);
                    this.add.rectangle(gx, gy - 75, 5, 30, 0x888888);
                    this.add.rectangle(gx, gy - 83, 20, 5, 0x888888);
                    gs.scene.pause();
                    this.showGameOver("GameScene", "UIScene");
                  },
                  this,
                );
              }
            });
          }
        }
        updateHealthBar(health) {
          const h = Math.max(0, health);
          this.healthBar.width = (h / 100) * 160;
          if (h > 60) this.healthBar.setFillStyle(0x00ff00);
          else if (h > 30) this.healthBar.setFillStyle(0xffff00);
          else this.healthBar.setFillStyle(0xff0000);
          this.healthText.setText(`HP: ${h}%`);
        }
        showGameOver(sn, ui) {
          const t = this.add
            .text(400, 300, "ИГРА ОКОНЧЕНА", {
              fontSize: "200px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#ff0000",
              stroke: "#000000",
              strokeThickness: 12,
            })
            .setOrigin(0.5)
            .setShadow(10, 10, "#000000", 20, true, true);
          this.tweens.add({
            targets: t,
            alpha: { from: 0, to: 1 },
            scale: { from: 0.5, to: 1.0 },
            duration: 600,
            ease: "Back.easeOut",
          });
          this.time.delayedCall(5000, () => {
            this.scene.stop(sn);
            this.scene.stop(ui);
            this.scene.start("MainMenuScene");
          });
        }
        shutdown() {
          const gs = this.scene.get("GameScene");
          if (gs) {
            gs.events.off("updateWave");
            gs.events.off("damageHuman");
          }
        }
      }

      // =================================================================
      // SCENE 2 (Фаза 2)
      // =================================================================
      class Scene2 extends Phaser.Scene {
        constructor() {
          super("Scene2");
        }
        create() {
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");
          this.dog = this.physics.add.sprite(700, 580, "dog_sprite");
          this.dog.setOrigin(0.5, 1);
          this.dog.body.allowGravity = false;
          this.dog.setCollideWorldBounds(true);
          this.dog.body.setSize(150, 100);
          this.dogHealth = 100;
          this.dogDirection = "left";
          this.isDogDead = false;
          this.mouth = this.add.zone(0, 0, 80, 80);
          this.physics.world.enable(this.mouth);
          this.mouth.body.setAllowGravity(false);
          this.footZone = this.add.zone(0, 0, 200, 60);
          this.physics.world.enable(this.footZone);
          this.footZone.body.setAllowGravity(false);
          this.kickedTicksCount = 0;
          this.kicksNeededForReward = 3;
          this.human = this.physics.add.sprite(200, 580, "player");
          this.human.setOrigin(0.5, 1);
          this.human.body.allowGravity = false;
          this.human.body.setSize(
            this.human.width * 0.5,
            this.human.height * 0.9,
          );
          this.human.setCollideWorldBounds(true);
          this.human.hasMushroom = false;
          this.humanFacing = "right";
          this.humanHealth = 100;
          this.isHumanDead = false;
          this.carriedMushroom = this.add
            .sprite(0, 0, "mushroom")
            .setScale(0.1)
            .setVisible(false);
          this.homeless = this.physics.add.sprite(600, 580, "homeless");
          this.homeless.setOrigin(0.5, 1);
          this.homeless.body.allowGravity = false;
          this.homeless.setCollideWorldBounds(true);
          this.homeless.body.setSize(
            this.homeless.width * 0.5,
            this.homeless.height * 0.9,
          );
          this.homeless.setVisible(false);
          this.homeless.active = false;
          this.homeless.isFallen = false;
          this.homeless.isVictory = false;
          this.homelessActive = false;
          this.homelessFacing = "left";
          this.homelessHealth = 100;
          this.isHomelessDead = false;
          this.time.addEvent({
            delay: Phaser.Math.Between(1000, 3000),
            loop: true,
            callback: () => {
              if (this.isDogDead) return;
              const a = Phaser.Math.RND.pick(["left", "right", "idle"]);
              if (a === "left") {
                this.dog.setVelocityX(-100);
                this.dogDirection = "left";
              } else if (a === "right") {
                this.dog.setVelocityX(100);
                this.dogDirection = "right";
              } else this.dog.setVelocityX(0);
            },
          });
          this.cursors = this.input.keyboard.createCursorKeys();
          this.jumpKey = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.SPACE,
          );
          this.debugKey = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.D,
          );
          this.isJumping = false;
          this.ticks = this.physics.add.group();
          this.mushrooms = this.add.group();
          this.wave = 1;
          this.ticksToSpawn = 5;
          this.spawnInterval = 1500;
          this.startWave();
          this.time.addEvent({
            delay: 10000,
            loop: true,
            callback: this.spawnMushroom,
            callbackScope: this,
          });
          // ── Фоновая музыка Scene2 ─────────────────────────────
          this.sound.stopAll();
          this.bgm = this.sound.add("fon1", { loop: true, volume: 0.25 });
          this.bgm.play();
        }
        update() {
          if (this.isDogDead || this.isHumanDead) return;
          if (Phaser.Input.Keyboard.JustDown(this.debugKey))
            this.physics.world.debugGraphic.visible =
              !this.physics.world.debugGraphic.visible;
          this.updateHumanPlayer();
          this.updateDogAI();
          this.updateHomeless();
          this.updateCollisions();
        }
        spawnMushroom() {
          if (
            this.isDogDead ||
            this.isHumanDead ||
            this.mushrooms.countActive(true) > 0
          )
            return;
          const x = Phaser.Math.Between(100, 700);
          const m = this.mushrooms.create(x, 580, "mushroom");
          m.setOrigin(0.5, 1).setScale(0.1);
          m.collected = false;
          this.time.delayedCall(
            8000,
            () => {
              if (m.active && !m.collected) m.destroy();
            },
            [],
            this,
          );
        }
        collectMushroom(human, mushroom) {
          if (this.human.hasMushroom) return;
          mushroom.collected = true;
          mushroom.destroy();
          this.human.hasMushroom = true;
          this.human.setTint(0x00ff00);
          this.mushroomCarryTimer = this.time.delayedCall(
            8000,
            () => {
              if (this.human && this.human.hasMushroom) {
                this.human.hasMushroom = false;
                this.human.clearTint();
                this.sound.play("eat", { volume: 0.8 });
                this.events.emit("healHuman", 20);
              }
            },
            [],
            this,
          );
        }
        deliverMushroom() {
          if (!this.human.hasMushroom) return;
          this.human.hasMushroom = false;
          this.human.clearTint();
          this.sound.play("eat", { volume: 0.8 });
          this.events.emit("healDog", 20);
          if (this.mushroomCarryTimer) this.mushroomCarryTimer.remove();
        }
        updateCollisions() {
          this.physics.overlap(this.footZone, this.ticks, (fz, tick) => {
            if (
              !this.human.hasMushroom &&
              tick.isFalling &&
              tick.body &&
              !tick.isKicked
            ) {
              tick.isKicked = true;
              // Звук пинка клеща
              this.sound.play(Phaser.Math.RND.pick(["hit2", "hit3"]), {
                volume: 0.8,
              });
              tick.isFalling = false;
              this.kickedTicksCount++;
              this.events.emit(
                "updateKickCount",
                this.kickedTicksCount,
                this.kicksNeededForReward,
              );
              if (this.kickedTicksCount >= this.kicksNeededForReward) {
                this.kickedTicksCount = 0;
                this.events.emit(
                  "updateKickCount",
                  this.kickedTicksCount,
                  this.kicksNeededForReward,
                );
                if (!this.isHumanDead) this.events.emit("healHuman", 20);
                if (!this.isDogDead) this.events.emit("healDog", 20);
                const rt = this.add
                  .text(400, 200, "+20 HP!", {
                    fontSize: "48px",
                    fontFamily: '"3_Muz-TV2000.ttf"',
                    color: "#00ff00",
                    stroke: "#000",
                    strokeThickness: 6,
                  })
                  .setOrigin(0.5);
                this.tweens.add({
                  targets: rt,
                  y: rt.y - 50,
                  alpha: 0,
                  scale: 1.5,
                  duration: 1500,
                  ease: "Power2",
                  onComplete: () => rt.destroy(),
                });
              }
              const kd = this.humanFacing === "right" ? 1 : -1,
                sx = tick.x,
                sy = tick.y,
                ex = sx + 200 * kd;
              tick.body.setVelocity(0, 0);
              tick.setTint(0x888888);
              this.tweens.add({
                targets: tick,
                x: ex,
                scale: 0.5,
                ease: "Sine.easeOut",
                duration: 500,
                onUpdate: (tw) => {
                  const t = tw.progress;
                  tick.y = sy - 4 * 150 * t * (1 - t);
                  tick.rotation = t * Math.PI * 4 * kd;
                  tick.alpha = 1 - t * 0.5;
                },
                onComplete: () => {
                  if (tick && tick.active) tick.destroy();
                },
              });
            }
          });
          if (
            this.homelessActive &&
            !this.homeless.isFallen &&
            !this.homeless.isVictory &&
            this.isJumping
          ) {
            this.physics.overlap(
              this.footZone,
              this.homeless,
              (fz, homeless) => {
                if (
                  this.isJumping &&
                  !homeless.isFallen &&
                  !homeless.isVictory
                ) {
                  // Звук пинка бомжа
                  this.sound.play(Phaser.Math.RND.pick(["hit2", "hit3"]), {
                    volume: 0.8,
                  });
                  this.events.emit("damageHomeless", 50);
                  if (this.homelessHealth <= 0 && !this.isHomelessDead) {
                    this.isHomelessDead = true;
                    this.homelessDied(homeless);
                    return;
                  }
                  homeless.isFallen = true;
                  homeless.isVictory = false;
                  homeless.setVelocityX(0);
                  homeless.originalY = homeless.y;
                  homeless.setOrigin(0.5, 0.5);
                  homeless.y = homeless.y - 312 / 2;
                  homeless.anims.play("homeless_death", true);
                  this.time.delayedCall(3000, () => {
                    if (homeless && homeless.active) {
                      homeless.isFallen = false;
                      homeless.setOrigin(0.5, 1);
                      homeless.y = homeless.originalY;
                    }
                  });
                }
              },
            );
          }
          this.physics.overlap(this.mouth, this.ticks, (mo, tick) => {
            if (tick.isFalling && tick.body && !tick.isKicked) {
              const dm = this.registry.get("damageMultiplier") || 1;
              this.events.emit("damageHuman", 10 * dm);
              this.sound.play("groan1", { volume: 0.7 });
              tick.destroy();
            }
          });
          this.physics.overlap(this.dog, this.ticks, (dog, tick) => {
            if (tick.isFalling && tick.body && !tick.isKicked) {
              const dm = this.registry.get("damageMultiplier") || 1;
              this.events.emit("damageDog", 10 * dm);
              this.sound.play("bark", { volume: 0.8 });
              tick.destroy();
            }
          });
          this.mushrooms.getChildren().forEach((m) => {
            if (!m.active) return;
            if (
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.human.getBounds(),
                m.getBounds(),
              )
            )
              this.collectMushroom(this.human, m);
          });
          if (
            this.human.hasMushroom &&
            Phaser.Geom.Intersects.RectangleToRectangle(
              this.dog.getBounds(),
              this.human.getBounds(),
            )
          )
            this.deliverMushroom();
        }
        updateHumanPlayer() {
          const js = this.registry.get("joystickState") || {};
          const mob = this.registry.get("isMobile") || false;
          this.mouth.x = this.human.body.center.x;
          this.mouth.y = this.human.body.center.y - 100;
          this.footZone.x = this.human.body.center.x;
          this.footZone.y = this.human.body.center.y + 120;
          if (this.human.hasMushroom) {
            this.carriedMushroom.setVisible(true);
            const off = this.humanFacing === "left" ? -60 : 60;
            this.carriedMushroom.x = this.human.x + off;
            this.carriedMushroom.y = this.human.y - 150;
            const dp =
              Phaser.Input.Keyboard.JustDown(this.cursors.down) ||
              (mob && js.down);
            if (dp) {
              this.human.hasMushroom = false;
              this.human.clearTint();
              this.sound.play("eat", { volume: 0.8 });
              if (this.mushroomCarryTimer) this.mushroomCarryTimer.remove();
              this.events.emit("healHuman", 20);
            }
          } else this.carriedMushroom.setVisible(false);
          const jp =
            Phaser.Input.Keyboard.JustDown(this.jumpKey) ||
            (mob && js.isJumping);
          if (jp && !this.isJumping) {
            this.isJumping = true;
            let vx = 0;
            if (mob && js.jumpDirection) {
              if (js.jumpDirection === "left") {
                vx = -200;
                this.humanFacing = "left";
                this.human.flipX = true;
              } else if (js.jumpDirection === "right") {
                vx = 200;
                this.humanFacing = "right";
                this.human.flipX = false;
              }
            } else {
              if (this.cursors.left.isDown) {
                vx = -200;
                this.humanFacing = "left";
                this.human.flipX = true;
              } else if (this.cursors.right.isDown) {
                vx = 200;
                this.humanFacing = "right";
                this.human.flipX = false;
              }
            }
            this.human.setVelocityX(vx);
            this.tweens.add({
              targets: this.human,
              y: this.human.y - 280,
              duration: 400,
              yoyo: true,
              ease: "Power2",
              onComplete: () => {
                this.isJumping = false;
                this.human.setVelocityX(0);
              },
            });
          }
          if (this.isJumping) return;
          const lp = this.cursors.left.isDown || (mob && js.left);
          const rp = this.cursors.right.isDown || (mob && js.right);
          if (lp) {
            this.human.setVelocityX(-200);
            this.human.anims.play("human_walk", true);
            this.human.flipX = true;
            this.humanFacing = "left";
          } else if (rp) {
            this.human.setVelocityX(200);
            this.human.anims.play("human_walk", true);
            this.human.flipX = false;
            this.humanFacing = "right";
          } else {
            this.human.setVelocityX(0);
            this.human.anims.play("human_idle", true);
          }
        }
        updateDogAI() {
          this.dog.flipX = false;
          if (this.dog.body.velocity.x < 0) {
            this._dogGoingRight = false;
            this.dog.anims.play("dog_walk_left", true);
          } else if (this.dog.body.velocity.x > 0) {
            if (!this._dogGoingRight) {
              this._dogGoingRight = true;
              if (!this._barkCooldown) {
                this._barkCooldown = true;
                this.sound.play("bark_aggressive", { volume: 0.6 });
                this.time.delayedCall(1500, () => {
                  this._barkCooldown = false;
                });
              }
            }
            this.dog.anims.play("dog_walk_right", true);
          } else {
            this._dogGoingRight = false;
            this.dog.anims.play("dog_idle", true);
            this.dog.flipX = this.dogDirection === "left";
          }
        }
        updateHomeless() {
          if (!this.homelessActive) return;
          if (this.homeless.isFallen) {
            this.homeless.setVelocityX(0);
            return;
          }
          if (this.homeless.isVictory) {
            this.homeless.setVelocityX(0);
            return;
          }
          const mushrooms = this.mushrooms
            .getChildren()
            .filter((m) => m.active);
          if (mushrooms.length > 0) {
            let closest = null,
              minDist = Infinity;
            mushrooms.forEach((m) => {
              const d = Phaser.Math.Distance.Between(
                this.homeless.x,
                this.homeless.y,
                m.x,
                m.y,
              );
              if (d < minDist) {
                minDist = d;
                closest = m;
              }
            });
            if (closest) {
              const diff = closest.x - this.homeless.x;
              if (Math.abs(diff) > 10) {
                if (diff > 0) {
                  this.homeless.setVelocityX(150);
                  this.homeless.flipX = false;
                  this.homelessFacing = "right";
                } else {
                  this.homeless.setVelocityX(-150);
                  this.homeless.flipX = true;
                  this.homelessFacing = "left";
                }
                this.homeless.anims.play("homeless_run", true);
              } else {
                this.homeless.setVelocityX(0);
                this.homeless.anims.play("homeless_idle", true);
              }
              if (
                Phaser.Geom.Intersects.RectangleToRectangle(
                  this.homeless.getBounds(),
                  closest.getBounds(),
                )
              ) {
                closest.destroy();
                this.sound.play("bomj", { volume: 0.8 });
                if (!this.isHomelessDead) this.events.emit("healHomeless", 40);
                this.homeless.setVelocityX(0);
                this.homeless.anims.play("homeless_victory", true);
                this.homeless.isVictory = true;
                this.time.delayedCall(1000, () => {
                  if (this.homeless && this.homeless.active)
                    this.homeless.isVictory = false;
                });
              }
            }
          } else {
            if (
              !this.homelessWalkTimer ||
              this.time.now > this.homelessWalkTimer
            ) {
              const a = Phaser.Math.RND.pick(["left", "right", "idle"]);
              if (a === "left") {
                this.homeless.setVelocityX(-80);
                this.homeless.flipX = true;
                this.homelessFacing = "left";
              } else if (a === "right") {
                this.homeless.setVelocityX(80);
                this.homeless.flipX = false;
                this.homelessFacing = "right";
              } else this.homeless.setVelocityX(0);
              this.homelessWalkTimer =
                this.time.now + Phaser.Math.Between(2000, 4000);
            }
            if (Math.abs(this.homeless.body.velocity.x) > 0)
              this.homeless.anims.play("homeless_walk", true);
            else this.homeless.anims.play("homeless_idle", true);
          }
        }
        homelessDied(homeless) {
          // Звук смерти бомжа (ярость)
          this.sound.play("rage", { volume: 0.9 });
          homeless.setVelocityX(0);
          homeless.isFallen = true;
          const fx = homeless.x,
            fy = homeless.y;
          homeless.setOrigin(0.5, 0.5);
          homeless.y = homeless.y - 156;
          homeless.anims.play("homeless_death", true);
          const puddle = this.add.graphics();
          puddle.fillStyle(0xffff00, 0.6);
          puddle.setDepth(-1);
          let pr = 0;
          this.time.addEvent({
            delay: 50,
            repeat: 40,
            callback: () => {
              pr += 2;
              puddle.clear();
              puddle.fillStyle(0xffff00, 0.6);
              puddle.fillEllipse(fx, fy, pr * 1.5, pr);
              for (let i = 0; i < 5; i++) {
                const a = Math.random() * Math.PI * 2,
                  d = pr * (0.8 + Math.random() * 0.4);
                puddle.fillCircle(
                  fx + Math.cos(a) * d,
                  fy + Math.sin(a) * d * 0.7,
                  5 + Math.random() * 10,
                );
              }
            },
          });
          this.time.delayedCall(4000, () => {
            this.scene.stop("Scene2");
            this.scene.stop("UIScene2");
            this.scene.stop("VirtualControlsScene");
            this.scene.start("Scene4");
            this.scene.launch("UIScene4");
            this.scene.launch("VirtualControlsScene");
          });
        }
        startWave() {
          if (this.wave > 12) {
            this.scene.stop("Scene2");
            this.scene.stop("UIScene2");
            this.scene.start("MainMenuScene");
            return;
          }
          if (this.isDogDead || this.isHumanDead) return;
          this.ticksSpawned = 0;
          this.events.emit("updateWave", this.wave);
          if (this.wave >= 6 && !this.homelessActive) {
            this.homelessActive = true;
            this.homeless.setVisible(true);
            this.homeless.active = true;
            this.events.emit("showHomelessBar");
          }
          if (this.tickSpawner) this.tickSpawner.remove();
          this.tickSpawner = this.time.addEvent({
            delay: this.spawnInterval,
            loop: true,
            callback: () => {
              if (this.ticksSpawned >= this.ticksToSpawn) {
                this.tickSpawner.remove();
                this.time.delayedCall(2000, () => {
                  this.wave++;
                  this.ticksToSpawn = Math.floor(this.ticksToSpawn * 1.4);
                  this.spawnInterval = Math.max(600, this.spawnInterval - 150);
                  this.startWave();
                });
                return;
              }
              this.spawnTick();
              this.ticksSpawned++;
            },
          });
        }
        spawnTick() {
          if (this.isDogDead || this.isHumanDead) return;
          const sx = Phaser.Math.Between(50, 750),
            sy = 580,
            py = Phaser.Math.Between(100, 300),
            ex = sx + Phaser.Math.Between(-150, 150);
          const tick = this.ticks.create(sx, sy, "tick");
          if (!tick) return;
          tick.setScale(0.8);
          tick.body.setAllowGravity(false);
          tick.body.setSize(tick.width * 1.2, tick.height * 1.2);
          tick.isFalling = false;
          this.tweens.add({
            targets: tick,
            x: ex,
            ease: "Sine.easeInOut",
            duration: Phaser.Math.Between(1200, 1800),
            onUpdate: (tw, t) => {
              const p = tw.progress,
                h = sy - py;
              t.y = sy - 4 * h * p * (1 - p);
              if (!t.isFalling && p > 0.5) t.isFalling = true;
            },
            onComplete: () => {
              if (tick.active) tick.destroy();
            },
          });
        }
        shutdown() {
          if (this.bgm) this.bgm.stop();
          if (this.tickSpawner) this.tickSpawner.remove();
          if (this.mushroomCarryTimer) this.mushroomCarryTimer.remove();
          this.events.off("updateWave");
          this.events.off("damageDog");
          this.events.off("damageHuman");
          this.events.off("healDog");
          this.events.off("healHuman");
          this.events.off("updateKickCount");
          this.events.off("showHomelessBar");
          this.events.off("damageHomeless");
          this.events.off("healHomeless");
        }
      }

            else if (vel.x > 10) this.socket.flipX = false;

            this.socketMouth.y = this.socket.y;

                this.human.getBounds(),
              )
            ) {
              this.flashCooldown = true;
              const fx = this.add.sprite(
                this.human.x,
                this.human.y - 150,
                "flash",
              );
              fx.setScale(1.2);
              fx.setBlendMode(Phaser.BlendModes.ADD);
              fx.setDepth(10);

              fx.once("animationcomplete", () => fx.destroy());
              this.human.setTint(0x44aaff);
              this.time.delayedCall(300, () => {
                if (this.human) this.human.clearTint();
              });
              this.time.delayedCall(1500, () => {
                this.flashCooldown = false;
              });
              this.sound.play("tok", { volume: 0.9 });
              this.events.emit("damageHuman4", 5);
            }
          } else this.socketMouth.x = -999;
        }
        updateHumanPlayer() {
          const js = this.registry.get("joystickState") || {};
          const mob = this.registry.get("isMobile") || false;
          const jp =
            Phaser.Input.Keyboard.JustDown(this.jumpKey) ||
            (mob && js.isJumping);
          if (jp && !this.isJumping) {
            this.isJumping = true;
            let vx = 0;
            if (mob && js.jumpDirection) {
              if (js.jumpDirection === "left") {
                vx = -200;
                this.humanFacing = "left";
                this.human.flipX = true;
              } else if (js.jumpDirection === "right") {
                vx = 200;
                this.humanFacing = "right";
                this.human.flipX = false;
              }
            } else {
              if (this.cursors.left.isDown) {
                vx = -200;
                this.humanFacing = "left";
                this.human.flipX = true;
              } else if (this.cursors.right.isDown) {
                vx = 200;
                this.humanFacing = "right";
                this.human.flipX = false;
              }
            }
            this.human.setVelocityX(vx);
            this.tweens.add({
              targets: this.human,
              y: this.human.y - 280,
              duration: 400,
              yoyo: true,
              ease: "Power2",
              onComplete: () => {
                this.isJumping = false;
                this.human.setVelocityX(0);
              },
            });
          }
          if (this.isJumping) return;
          const lp = this.cursors.left.isDown || (mob && js.left);
          const rp = this.cursors.right.isDown || (mob && js.right);
          if (lp) {
            this.human.setVelocityX(-200);
            this.human.anims.play("human_walk", true);
            this.human.flipX = true;
            this.humanFacing = "left";
          } else if (rp) {
            this.human.setVelocityX(200);
            this.human.anims.play("human_walk", true);
            this.human.flipX = false;
            this.humanFacing = "right";
          } else {
            this.human.setVelocityX(0);
            this.human.anims.play("human_idle", true);
          }
          const djp =
            Phaser.Input.Keyboard.JustDown(this.cursors.down) ||
            (mob && js.down && !this._prevDown);
          this._prevDown = mob && js.down;
          if (djp && this.human.hasConnecter && !this.thrownConnecter)
            this.throwConnecter();
        }
        throwConnecter() {
          this.human.hasConnecter = false;
          this.carriedConnecter.setVisible(false);
          if (this.conecterTimer) this.conecterTimer.remove();
          const proj = this.physics.add.image(
            this.carriedConnecter.x,
            this.carriedConnecter.y,
            "conecter",
          );
          proj.setScale(0.18);
          proj.body.setAllowGravity(false);
          proj.setDepth(5);
          const angle = this.carriedConnecter.angle;
          proj.setAngle(angle);
          const speed = 600;
          let vx = 0,
            vy = 0;
          if (angle === 0) vy = -speed;
          else if (angle === 90) vx = speed;
          else if (angle === -90) vx = -speed;
          else if (angle === 180)
            vx = this.humanFacing === "right" ? speed : -speed;
          else vx = this.humanFacing === "right" ? speed : -speed;
          proj.setVelocity(vx, vy);
          this.conecterMouth.x = proj.x;
          this.conecterMouth.y = proj.y;
          this.thrownConnecter = proj;
        }
        spawnConnecter() {
          if (this.conecters.countActive(true) > 0 || this.human.hasConnecter)
            return;
          const x = Phaser.Math.Between(80, 720);
          const item = this.conecters.create(x, 575, "conecter");
          item.setOrigin(0.5, 1).setScale(0.18);
          item.body.allowGravity = false;
          this.time.delayedCall(10000, () => {
            if (item && item.active) item.destroy();
          });
        }
        updateConnecter() {
          if (!this.carriedConnecter) return;
          if (!this.human.hasConnecter) {
            this.conecters.getChildren().forEach((item) => {
              if (!item.active) return;
              if (
                Phaser.Geom.Intersects.RectangleToRectangle(
                  this.human.getBounds(),
                  item.getBounds(),
                )
              ) {
                item.destroy();
                this.human.hasConnecter = true;
                this.carriedConnecter.setVisible(true);
                this.conecterTimer = this.time.delayedCall(8000, () => {
                  this.human.hasConnecter = false;
                  this.carriedConnecter.setVisible(false);
                  this.conecterMouth.x = -999;
                  this.conecterMouth.y = -999;
                });
              }
            });
          }
          if (this.human.hasConnecter) {
            const vel = this.human.body.velocity;
            const coff = this.humanFacing === "left" ? -60 : 60;
            this.carriedConnecter.x = this.human.x + coff;
            this.carriedConnecter.y = this.human.y - 130;
            if (vel.x > 10) this.carriedConnecter.angle = 90;
            else if (vel.x < -10) this.carriedConnecter.angle = -90;
            else if (this.isJumping) this.carriedConnecter.angle = 180;
            else this.carriedConnecter.angle = 0;
            this.conecterMouth.x = this.carriedConnecter.x;
            this.conecterMouth.y = this.carriedConnecter.y;
          } else {
            if (!this.thrownConnecter) {
              this.conecterMouth.x = -999;
              this.conecterMouth.y = -999;
            }
          }
          if (this.thrownConnecter) {
            const p = this.thrownConnecter;
            this.conecterMouth.x = p.x;
            this.conecterMouth.y = p.y;
            if (
              !this.boomCooldown &&
              this.socket &&
              this.socket.active &&
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.conecterMouth.getBounds(),
                this.socketMouth.getBounds(),
              )
            ) {
              this.boomCooldown = true;
              const bx = (p.x + this.socket.x) / 2,
                by = (p.y + this.socket.y) / 2;
              const boom = this.add.image(bx, by, "boom");
              boom
                .setScale(0.6)
                .setBlendMode(Phaser.BlendModes.ADD)
                .setDepth(15);
              this.tweens.add({
                targets: boom,
                scale: { from: 0.2, to: 1.0 },
                alpha: { from: 1, to: 0 },
                duration: 600,
                ease: "Power2",
                onComplete: () => boom.destroy(),
              });
              const kick = Phaser.Math.RND.pick([
                [300, 0],
                [-300, 0],
                [0, 260],
                [0, -260],
              ]);
              this.socket.setVelocity(kick[0], kick[1]);
              this.time.delayedCall(800, () => {
                this.boomCooldown = false;
              });
              this.sound.play("boom_snd", { volume: 0.9 });
              this.events.emit("damageSocket4", 20);
              p.destroy();
              this.thrownConnecter = null;
              this.conecterMouth.x = -999;
              this.conecterMouth.y = -999;
            }
            if (
              p.active &&
              (p.x < -50 || p.x > 850 || p.y < -50 || p.y > 650)
            ) {
              p.destroy();
              this.thrownConnecter = null;
              this.conecterMouth.x = -999;
              this.conecterMouth.y = -999;
            }
          }
        }
        updateDogAI() {
          this.dog.flipX = false;
          if (this.dog.body.velocity.x < 0)
            this.dog.anims.play("dog_walk_left", true);
          else if (this.dog.body.velocity.x > 0) {
            if (!this._barkCooldown) {
              this._barkCooldown = true;
              this.sound.play("bark_aggressive", { volume: 0.6 });
              this.time.delayedCall(1500, () => {
                this._barkCooldown = false;
              });
            }
            this.dog.anims.play("dog_walk_right", true);
          } else {
            this.dog.anims.play("dog_idle", true);
            this.dog.flipX = this.dogDirection === "left";
          }
        }
        shutdown() {
          if (this.bgm) this.bgm.stop();
        }
      }
