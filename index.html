<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Tick Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      @font-face {
        font-family: "3_Muz-TV2000.ttf";
        src: url("assets/fonts/3_Muz-TV2000.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        touch-action: none;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #1d1d1d;
      }

      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }

      /* Убираем границу на мобильных */
      @media (max-width: 768px) {
        canvas {
          border: none;
        }
      }
    </style>
  </head>
  <body>
    <script>
      // =================================================================
      // SCENE 1: PRELOAD
      // =================================================================
      class PreloadScene extends Phaser.Scene {
        constructor() {
          super("PreloadScene");
        }

        preload() {
          const assetPath = "assets/images/";
          this.load.spritesheet("player", `${assetPath}player_sprite.png`, {
            frameWidth: 216,
            frameHeight: 312,
          });

          this.load.spritesheet("dog_sprite", `${assetPath}dog_sprite.png`, {
            frameWidth: 195,
            frameHeight: 128,
          });

          this.load.spritesheet("homeless", `${assetPath}homeless_sprite.png`, {
            frameWidth: 216,
            frameHeight: 312,
          });

          this.load.image("tick", `${assetPath}tick.png`);
          this.load.image("sky", `${assetPath}sky.jpg`);
          this.load.image("background", `${assetPath}background.png`);
          this.load.image("background2", `${assetPath}background2.png`);
          this.load.image("mushroom", `${assetPath}mushroom.png`);
          this.load.spritesheet("socket", `${assetPath}socket.png`, {
            frameWidth: 512,
            frameHeight: 512,
          });
          this.load.image("conecter", `${assetPath}conecter.png`);
          this.load.spritesheet("flash", `${assetPath}flash.png`, {
            frameWidth: 281,
            frameHeight: 307,
          });
          this.load.image("boom", `${assetPath}boom.png`);
          this.load.spritesheet("humanFight", `${assetPath}humanFight.png`, {
            frameWidth: 172,
            frameHeight: 249,
          });
          this.load.spritesheet("robot", `${assetPath}robot.png`, {
            frameWidth: 172,
            frameHeight: 249,
          });
        }

        create() {
          // Создаём ВСЕ анимации один раз при загрузке игры
          this.createAllAnimations();

          this.scene.start("MainMenuScene");
        }

        createAllAnimations() {
          // Анимации человека
          if (!this.anims.exists("human_walk")) {
            this.anims.create({
              key: "human_walk",
              frames: this.anims.generateFrameNumbers("player", {
                start: 4,
                end: 11,
              }),
              frameRate: 10,
              repeat: -1,
            });
          }
          if (!this.anims.exists("human_idle")) {
            this.anims.create({
              key: "human_idle",
              frames: this.anims.generateFrameNumbers("player", {
                start: 0,
                end: 3,
              }),
              frameRate: 5,
              repeat: -1,
            });
          }
          if (!this.anims.exists("human_death")) {
            this.anims.create({
              key: "human_death",
              frames: this.anims.generateFrameNumbers("player", {
                start: 12,
                end: 15,
              }),
              frameRate: 10,
              repeat: 0,
            });
          }

          // Анимации собаки
          if (!this.anims.exists("dog_idle")) {
            this.anims.create({
              key: "dog_idle",
              frames: this.anims.generateFrameNumbers("dog_sprite", {
                start: 0,
                end: 3,
              }),
              frameRate: 5,
              repeat: -1,
            });
          }
          if (!this.anims.exists("dog_walk_right")) {
            this.anims.create({
              key: "dog_walk_right",
              frames: this.anims.generateFrameNumbers("dog_sprite", {
                start: 12,
                end: 15,
              }),
              frameRate: 10,
              repeat: -1,
            });
          }
          if (!this.anims.exists("dog_walk_left")) {
            this.anims.create({
              key: "dog_walk_left",
              frames: this.anims.generateFrameNumbers("dog_sprite", {
                start: 5,
                end: 7,
              }),
              frameRate: 10,
              repeat: -1,
            });
          }
          if (!this.anims.exists("dog_jump")) {
            this.anims.create({
              key: "dog_jump",
              frames: this.anims.generateFrameNumbers("dog_sprite", {
                start: 12,
                end: 15,
              }),
              frameRate: 12,
              repeat: 0,
            });
          }
          if (!this.anims.exists("dog_death")) {
            this.anims.create({
              key: "dog_death",
              frames: this.anims.generateFrameNumbers("dog_sprite", {
                start: 0,
                end: 0,
              }),
              frameRate: 1,
              repeat: 0,
            });
          }

          // Анимации для меню (с другими ключами чтобы не конфликтовать)
          if (!this.anims.exists("menu_human_walk")) {
            this.anims.create({
              key: "menu_human_walk",
              frames: this.anims.generateFrameNumbers("player", {
                start: 4,
                end: 11,
              }),
              frameRate: 10,
              repeat: -1,
            });
          }
          if (!this.anims.exists("menu_human_idle")) {
            this.anims.create({
              key: "menu_human_idle",
              frames: this.anims.generateFrameNumbers("player", {
                start: 0,
                end: 3,
              }),
              frameRate: 5,
              repeat: -1,
            });
          }
          if (!this.anims.exists("menu_dog_idle")) {
            this.anims.create({
              key: "menu_dog_idle",
              frames: this.anims.generateFrameNumbers("dog_sprite", {
                start: 0,
                end: 3,
              }),
              frameRate: 5,
              repeat: -1,
            });
          }
          if (!this.anims.exists("menu_dog_walk_right")) {
            this.anims.create({
              key: "menu_dog_walk_right",
              frames: this.anims.generateFrameNumbers("dog_sprite", {
                start: 12,
                end: 15,
              }),
              frameRate: 10,
              repeat: -1,
            });
          }
          if (!this.anims.exists("menu_dog_walk_left")) {
            this.anims.create({
              key: "menu_dog_walk_left",
              frames: this.anims.generateFrameNumbers("dog_sprite", {
                start: 5,
                end: 7,
              }),
              frameRate: 10,
              repeat: -1,
            });
          }

          // Анимации бомжа
          if (!this.anims.exists("homeless_idle")) {
            this.anims.create({
              key: "homeless_idle",
              frames: this.anims.generateFrameNumbers("homeless", {
                start: 0,
                end: 3,
              }),
              frameRate: 5,
              repeat: -1,
            });
          }
          if (!this.anims.exists("homeless_walk")) {
            this.anims.create({
              key: "homeless_walk",
              frames: this.anims.generateFrameNumbers("homeless", {
                start: 4,
                end: 7,
              }),
              frameRate: 10,
              repeat: -1,
            });
          }
          if (!this.anims.exists("homeless_run")) {
            this.anims.create({
              key: "homeless_run",
              frames: this.anims.generateFrameNumbers("homeless", {
                start: 4,
                end: 7,
              }),
              frameRate: 14,
              repeat: -1,
            });
          }
          if (!this.anims.exists("homeless_death")) {
            this.anims.create({
              key: "homeless_death",
              frames: this.anims.generateFrameNumbers("homeless", {
                start: 8,
                end: 11,
              }),
              frameRate: 8,
              repeat: 0,
            });
          }
          if (!this.anims.exists("homeless_victory")) {
            this.anims.create({
              key: "homeless_victory",
              frames: this.anims.generateFrameNumbers("homeless", {
                start: 12,
                end: 15,
              }),
              frameRate: 8,
              repeat: -1,
            });
          }
          if (!this.anims.exists("socket_fly")) {
            this.anims.create({
              key: "socket_fly",
              frames: this.anims.generateFrameNumbers("socket", {
                start: 0,
                end: 3,
              }),
              frameRate: 6,
              repeat: -1,
            });
          }
        }
      }

      // =================================================================
      // SCENE 2: MAIN MENU
      // =================================================================
      class MainMenuScene extends Phaser.Scene {
        constructor() {
          super("MainMenuScene");
        }

        create() {
          // *** СБРОС НАСТРОЕК СЛОЖНОСТИ ***
          this.registry.set("difficulty", null);
          this.registry.set("damageMultiplier", 1);
          console.log("🔄 Настройки сложности сброшены");

          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");

          this.add
            .text(400, 200, "Клещ", {
              fontSize: "200px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#eb1717",
            })
            .setOrigin(0.5)
            .setShadow(2, 2, "#000000", 2, true, true);

          // Анимации бойца (Scene5)
          if (!this.anims.exists("fight_idle")) {
            this.anims.create({
              key: "fight_idle",
              frames: this.anims.generateFrameNumbers("humanFight", {
                start: 0,
                end: 3,
              }),
              frameRate: 5,
              repeat: -1,
            });
          }
          if (!this.anims.exists("fight_walk")) {
            this.anims.create({
              key: "fight_walk",
              frames: this.anims.generateFrameNumbers("humanFight", {
                start: 4,
                end: 7,
              }),
              frameRate: 10,
              repeat: -1,
            });
          }
          if (!this.anims.exists("fight_kick")) {
            this.anims.create({
              key: "fight_kick",
              frames: this.anims.generateFrameNumbers("humanFight", {
                start: 8,
                end: 11,
              }),
              frameRate: 12,
              repeat: 0,
            });
          }
          if (!this.anims.exists("fight_punch")) {
            this.anims.create({
              key: "fight_punch",
              frames: this.anims.generateFrameNumbers("humanFight", {
                start: 12,
                end: 15,
              }),
              frameRate: 12,
              repeat: 0,
            });
          }
          if (!this.anims.exists("robot_run")) {
            this.anims.create({
              key: "robot_run",
              frames: this.anims.generateFrameNumbers("robot", {
                start: 0,
                end: 7,
              }),
              frameRate: 12,
              repeat: -1,
            });
          }
          if (!this.anims.exists("robot_punch")) {
            this.anims.create({
              key: "robot_punch",
              frames: this.anims.generateFrameNumbers("robot", {
                start: 8,
                end: 11,
              }),
              frameRate: 12,
              repeat: 0,
            });
          }
          if (!this.anims.exists("robot_kick")) {
            this.anims.create({
              key: "robot_kick",
              frames: this.anims.generateFrameNumbers("robot", {
                start: 12,
                end: 15,
              }),
              frameRate: 12,
              repeat: 0,
            });
          }
          if (!this.anims.exists("flash_anim")) {
            this.anims.create({
              key: "flash_anim",
              frames: this.anims.generateFrameNumbers("flash", {
                start: 0,
                end: 7,
              }),
              frameRate: 16,
              repeat: 0,
            });
          }

          const startButton = this.add
            .text(400, 350, "Старт", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "82px",
              color: "#00ff00",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setInteractive();
          startButton.on("pointerover", () => {
            startButton.setStyle({ fill: "#ff0" });
          });
          startButton.on("pointerout", () => {
            startButton.setStyle({ fill: "#00ff00" });
          });
          startButton.on("pointerdown", () => {
            this.scene.start("DifficultySelectScene");
          });

          this.human = this.physics.add.sprite(100, 580, "player");
          this.human.setOrigin(0.5, 1).body.allowGravity = false;
          this.humanDirection = 1;
          this.humanPaused = false;
          this.time.addEvent({
            delay: 6000,
            loop: true,
            callback: () => {
              this.humanPaused = true;
              this.time.delayedCall(4000, () => {
                this.humanPaused = false;
              });
            },
          });

          this.dog = this.physics.add.sprite(700, 580, "dog_sprite");
          this.dog.setCollideWorldBounds(true);
          this.dog.setOrigin(0.5, 1).body.allowGravity = false;
          this.dogDirection = "left";

          this.time.addEvent({
            delay: Phaser.Math.Between(1000, 3000),
            loop: true,
            callback: () => {
              const action = Phaser.Math.RND.pick(["left", "right", "idle"]);
              switch (action) {
                case "left":
                  this.dog.setVelocityX(-100);
                  this.dogDirection = "left";
                  break;
                case "right":
                  this.dog.setVelocityX(100);
                  this.dogDirection = "right";
                  break;
                case "idle":
                  this.dog.setVelocityX(0);
                  break;
              }
            },
          });
        }

        update() {
          this.updateHumanAI();
          this.updateDogAI();
        }

        updateDogAI() {
          this.dog.flipX = false;
          if (this.dog.body.velocity.x < 0) {
            this.dog.anims.play("menu_dog_walk_left", true);
          } else if (this.dog.body.velocity.x > 0) {
            this.dog.anims.play("menu_dog_walk_right", true);
          } else {
            this.dog.anims.play("menu_dog_idle", true);
            this.dog.flipX = this.dogDirection === "left";
          }
        }

        updateHumanAI() {
          if (this.humanPaused) {
            this.human.setVelocityX(0);
            this.human.anims.play("menu_human_idle", true);
            return;
          }
          const leftBound = 40,
            rightBound = 760;
          if (this.human.x >= rightBound) {
            this.humanDirection = -1;
          } else if (this.human.x <= leftBound) {
            this.humanDirection = 1;
          }
          this.human.setVelocityX(100 * this.humanDirection);
          this.human.flipX = this.human.body.velocity.x < 0;
          this.human.anims.play("menu_human_walk", true);
        }
      }

      // =================================================================
      // SCENE 2.5: ВЫБОР СЛОЖНОСТИ
      // =================================================================
      class DifficultySelectScene extends Phaser.Scene {
        constructor() {
          super("DifficultySelectScene");
        }

        create() {
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");

          // Заголовок
          this.add
            .text(400, 150, "Выберите сложность", {
              fontSize: "64px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#ffffff",
            })
            .setOrigin(0.5)
            .setShadow(3, 3, "#000000", 5, true, true);

          // Кнопка "Нормальный"
          const normalButton = this.add
            .text(400, 280, "Нормальный", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "60px",
              color: "#00ff00",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setInteractive();

          normalButton.on("pointerover", () => {
            normalButton.setStyle({ fill: "#ff0" });
          });
          normalButton.on("pointerout", () => {
            normalButton.setStyle({ fill: "#00ff00" });
          });
          normalButton.on("pointerdown", () => {
            // Устанавливаем нормальную сложность
            this.registry.set("difficulty", "normal");
            this.registry.set("damageMultiplier", 1);
            console.log("💚 Выбрана сложность: Нормальный (урон x1)");
            this.scene.start("GameScene");
            this.scene.launch("UIScene");
            this.scene.launch("VirtualControlsScene");
          });

          // Подсказка под нормальной кнопкой
          this.add
            .text(400, 340, "Обычный урон от клещей", {
              fontSize: "24px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#aaaaaa",
            })
            .setOrigin(0.5);

          // Кнопка "Хардкор"
          const hardcoreButton = this.add
            .text(400, 420, "Хардкор", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "60px",
              color: "#ff0000",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setInteractive();

          hardcoreButton.on("pointerover", () => {
            hardcoreButton.setStyle({ fill: "#ff00ff" });
          });
          hardcoreButton.on("pointerout", () => {
            hardcoreButton.setStyle({ fill: "#ff0000" });
          });
          hardcoreButton.on("pointerdown", () => {
            // Устанавливаем хардкорную сложность
            this.registry.set("difficulty", "hardcore");
            this.registry.set("damageMultiplier", 2);
            console.log("💀 Выбрана сложность: Хардкор (урон x2)");
            this.scene.start("GameScene");
            this.scene.launch("UIScene");
            this.scene.launch("VirtualControlsScene");
          });

          // Подсказка под хардкорной кнопкой
          this.add
            .text(400, 480, "Урон от клещей x2!", {
              fontSize: "24px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#ff6666",
            })
            .setOrigin(0.5);
        }
      }

      // =================================================================
      // SCENE 3: GAME (Фаза 1: Игрок = Собака, AI = Человек)
      // =================================================================
      class GameScene extends Phaser.Scene {
        constructor() {
          super("GameScene");
        }

        create() {
          this.add.image(400, 300, "sky");
          this.add.image(400, 300, "background");

          // Dog Setup
          this.dog = this.physics.add.sprite(200, 580, "dog_sprite");
          this.dog.setOrigin(0.5, 1);
          this.dog.body.allowGravity = false;
          this.dog.setCollideWorldBounds(true);
          this.dog.hasMushroom = false;

          this.mouth = this.add.zone(0, 0, 60, 60);
          this.physics.world.enable(this.mouth);
          this.mouth.body.setAllowGravity(false);

          this.carriedMushroom = this.add
            .sprite(0, 0, "mushroom")
            .setScale(0.1)
            .setVisible(false);

          // Human Setup
          this.human = this.physics.add.sprite(100, 580, "player");
          this.human.setOrigin(0.5, 1);
          this.human.body.allowGravity = false;
          this.human.body.setSize(
            this.human.width * 0.5,
            this.human.height * 0.9,
          );
          this.humanHealth = 100;
          this.humanSpeed = 100;
          this.humanDirection = 1;
          this.humanPaused = false;
          this.isHumanDead = false;

          this.time.addEvent({
            delay: 6000,
            loop: true,
            callback: () => {
              this.humanPaused = true;
              this.time.delayedCall(4000, () => {
                this.humanPaused = false;
              });
            },
          });

          this.cursors = this.input.keyboard.createCursorKeys();
          this.jumpKey = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.SPACE,
          );
          this.isJumping = false;

          this.ticks = this.physics.add.group();
          this.mushrooms = this.physics.add.group();
          this.wave = 1;
          this.ticksToSpawn = 5;
          this.spawnInterval = 1500;
          this.startWave();

          this.time.addEvent({
            delay: 10000,
            loop: true,
            callback: this.spawnMushroom,
            callbackScope: this,
          });
        }

        update() {
          if (this.isHumanDead) return;
          this.updateDog();
          this.updateHuman();
          this.updateCollisions();
        }

        spawnMushroom() {
          if (this.mushrooms.countActive(true) > 0) return;
          const x = Phaser.Math.Between(100, 700);
          const mushroom = this.mushrooms.create(x, 580, "mushroom");
          mushroom.setOrigin(0.5, 1).setScale(0.1);
          mushroom.collected = false; // Флаг - был ли подобран гриб

          this.time.delayedCall(
            8000,
            () => {
              // Удаляем только если гриб НЕ был подобран
              if (mushroom.active && !mushroom.collected) {
                mushroom.destroy();
              }
            },
            [],
            this,
          );
        }

        collectMushroom(mouth, mushroom) {
          if (this.dog.hasMushroom) return;
          mushroom.collected = true; // Помечаем что гриб подобран
          mushroom.destroy();
          this.dog.hasMushroom = true;
          this.dog.setTint(0x00ff00);
          this.mushroomCarryTimer = this.time.delayedCall(
            8000,
            () => {
              this.dog.hasMushroom = false;
              this.dog.clearTint();
            },
            [],
            this,
          );
        }

        deliverMushroom(dog, human) {
          if (!this.dog.hasMushroom) return;
          this.dog.hasMushroom = false;
          this.events.emit("damageHuman", -20);
          this.dog.clearTint();
          if (this.mushroomCarryTimer) this.mushroomCarryTimer.remove();
        }

        updateDog() {
          // Получаем джойстик для мобильных
          const joystickState = this.registry.get("joystickState") || {};
          const isMobile = this.registry.get("isMobile") || false;

          this.mouth.x = this.dog.body.center.x;
          this.mouth.y = this.dog.body.center.y - 40;

          if (this.dog.hasMushroom) {
            this.carriedMushroom.setVisible(true);
            const offset = this.dogFacing === "left" ? -60 : 60;
            this.carriedMushroom.x = this.mouth.x + offset;
            this.carriedMushroom.y = this.mouth.y;

            // *** НОВОЕ: Джойстик вниз - собака съедает гриб сама ***
            const downPressed =
              Phaser.Input.Keyboard.JustDown(this.cursors.down) ||
              (isMobile && joystickState.down);
            if (downPressed) {
              console.log("🐕 Собака съела гриб! (джойстик вниз)");
              this.dog.hasMushroom = false;
              this.dog.clearTint();
              if (this.mushroomCarryTimer) this.mushroomCarryTimer.remove();
              console.log("🐕 Гриб использован собакой на себя!");
            }
          } else {
            this.carriedMushroom.setVisible(false);
          }

          // Прыжок - клавиатура или свайп вверх
          const jumpPressed =
            Phaser.Input.Keyboard.JustDown(this.jumpKey) ||
            (isMobile && joystickState.isJumping);
          if (jumpPressed && !this.isJumping) {
            this.isJumping = true;
            this.dog.anims.play("dog_jump");

            // Определяем направление прыжка
            let jumpVelocityX = 0;

            if (isMobile && joystickState.jumpDirection) {
              // Прыжок по диагонали на мобильном (свайп вверх-влево/вправо)
              if (joystickState.jumpDirection === "left") {
                jumpVelocityX = -200;
                this.dogFacing = "left";
              } else if (joystickState.jumpDirection === "right") {
                jumpVelocityX = 200;
                this.dogFacing = "right";
              }
            } else {
              // Клавиатура или прыжок на месте
              const leftPressed = this.cursors.left.isDown;
              const rightPressed = this.cursors.right.isDown;

              if (leftPressed) {
                jumpVelocityX = -200;
                this.dogFacing = "left";
              } else if (rightPressed) {
                jumpVelocityX = 200;
                this.dogFacing = "right";
              }
            }

            this.dog.flipX = this.dogFacing === "left";
            this.dog.setVelocityX(jumpVelocityX);

            this.tweens.add({
              targets: this.dog,
              y: this.dog.y - 280,
              duration: 400,
              yoyo: true,
              ease: "Power2",
              onComplete: () => {
                this.isJumping = false;
                this.dog.setVelocityX(0);
              },
            });
          }
          if (this.isJumping) return;

          // Горизонтальное движение - клавиатура или свайп влево/вправо
          const leftPressed =
            this.cursors.left.isDown || (isMobile && joystickState.left);
          const rightPressed =
            this.cursors.right.isDown || (isMobile && joystickState.right);

          this.dog.flipX = false;
          if (leftPressed) {
            this.dog.setVelocityX(-200);
            this.dog.anims.play("dog_walk_left", true);
            this.dogFacing = "left";
          } else if (rightPressed) {
            this.dog.setVelocityX(200);
            this.dog.anims.play("dog_walk_right", true);
            this.dogFacing = "right";
          } else {
            this.dog.setVelocityX(0);
            this.dog.anims.play("dog_idle", true);
            this.dog.flipX = this.dogFacing === "left";
          }
        }

        updateHuman() {
          if (this.isHumanDead) return;

          if (this.humanPaused) {
            this.human.setVelocityX(0);
          } else {
            const leftBound = 40,
              rightBound = 760;
            if (this.human.x >= rightBound) {
              this.humanDirection = -1;
            } else if (this.human.x <= leftBound) {
              this.humanDirection = 1;
            }
            this.human.setVelocityX(this.humanSpeed * this.humanDirection);
          }

          if (this.human.body.velocity.x > 0) {
            this.human.flipX = false;
            this.human.anims.play("human_walk", true);
          } else if (this.human.body.velocity.x < 0) {
            this.human.flipX = true;
            this.human.anims.play("human_walk", true);
          } else {
            this.human.anims.play("human_idle", true);
          }
        }

        updateCollisions() {
          this.ticks.getChildren().forEach((tick) => {
            if (!tick.active) return;
            if (
              !this.dog.hasMushroom &&
              tick.isFalling &&
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.mouth.getBounds(),
                tick.getBounds(),
              )
            ) {
              tick.destroy();
              return;
            }
            if (
              tick.isFalling &&
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.human.getBounds(),
                tick.getBounds(),
              )
            ) {
              const damageMultiplier =
                this.registry.get("damageMultiplier") || 1;
              const damage = 10 * damageMultiplier;
              this.events.emit("damageHuman", damage);
              tick.destroy();
            }
          });
          this.mushrooms.getChildren().forEach((mushroom) => {
            if (!mushroom.active) return;
            if (
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.mouth.getBounds(),
                mushroom.getBounds(),
              )
            ) {
              this.collectMushroom(this.mouth, mushroom);
            }
          });
          if (
            this.dog.hasMushroom &&
            Phaser.Geom.Intersects.RectangleToRectangle(
              this.dog.getBounds(),
              this.human.getBounds(),
            )
          ) {
            this.deliverMushroom();
          }
        }

        startWave() {
          if (this.isHumanDead) return;
          this.ticksSpawned = 0;
          this.events.emit("updateWave", this.wave);
          if (this.tickSpawner) this.tickSpawner.remove();
          this.tickSpawner = this.time.addEvent({
            delay: this.spawnInterval,
            loop: true,
            callback: () => {
              if (this.ticksSpawned >= this.ticksToSpawn) {
                this.tickSpawner.remove();
                this.time.delayedCall(2000, () => {
                  this.wave++;

                  // Проверка после инкремента - если завершили 3 волны, переходим на Scene2
                  if (this.wave > 3) {
                    this.scene.stop("GameScene");
                    this.scene.stop("UIScene");
                    this.scene.stop("VirtualControlsScene");
                    this.scene.start("Scene2");
                    this.scene.launch("UIScene2");
                    this.scene.launch("VirtualControlsScene");
                    return;
                  }

                  this.ticksToSpawn = Math.floor(this.ticksToSpawn * 1.4);
                  this.spawnInterval = Math.max(600, this.spawnInterval - 150);
                  this.startWave();
                });
                return;
              }
              this.spawnTick();
              this.ticksSpawned++;
            },
          });
        }

        spawnTick() {
          if (this.isHumanDead) return;
          const startX = Phaser.Math.Between(50, 750);
          const startY = 580;
          const peakY = Phaser.Math.Between(100, 300);
          const endX = startX + Phaser.Math.Between(-150, 150);
          const tick = this.ticks.create(startX, startY, "tick");
          if (!tick) return;

          tick.setScale(0.8);
          tick.body.setAllowGravity(false);
          tick.isFalling = false;

          this.tweens.add({
            targets: tick,
            x: endX,
            ease: "Sine.easeInOut",
            duration: Phaser.Math.Between(1200, 1800),
            onUpdate: (tween, target) => {
              const t = tween.progress;
              const h = startY - peakY;
              target.y = startY - 4 * h * t * (1 - t);
              if (!target.isFalling && t > 0.5) target.isFalling = true;
            },
            onComplete: () => {
              if (tick) tick.destroy();
            },
          });
        }

        shutdown() {
          // Очищаем таймеры при остановке сцены
          if (this.tickSpawner) {
            this.tickSpawner.remove();
          }
          if (this.mushroomCarryTimer) {
            this.mushroomCarryTimer.remove();
          }
          // Очищаем все события
          this.events.off("updateWave");
          this.events.off("damageHuman");
        }
      }

      // =================================================================
      // SCENE 4: UI для первой фазы

      class UIScene extends Phaser.Scene {
        constructor() {
          super("UIScene");
        }
        create() {
          const textStyle = {
            fontFamily: "3_Muz-TV2000.ttf",
            fontSize: "16px",
            fill: "#fff",
          };
          this.healthBarBg = this.add
            .rectangle(120, 30, 160, 20, 0x000000)
            .setOrigin(0.5);
          this.healthBar = this.add
            .rectangle(120, 30, 160, 20, 0x00ff00)
            .setOrigin(0.5);
          this.healthText = this.add.text(45, 45, "HP: 100%", textStyle);
          this.waveText = this.add
            .text(400, 30, "Волна 1", {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "24px",
              fill: "#eb8c17",
            })
            .setOrigin(0.5);

          // Индикатор сложности
          const difficulty = this.registry.get("difficulty");
          const difficultyText =
            difficulty === "hardcore" ? "ХАРДКОР" : "НОРМАЛЬНЫЙ";
          const difficultyColor =
            difficulty === "hardcore" ? "#ff0000" : "#00ff00";
          this.add
            .text(750, 15, difficultyText, {
              fontFamily: '"3_Muz-TV2000.ttf"',
              fontSize: "16px",
              fill: difficultyColor,
            })
            .setOrigin(1, 0);

          const gameScene = this.scene.get("GameScene");
          if (gameScene && gameScene.scene.isActive()) {
            // КРИТИЧНО: Отписываемся от старых событий перед новой подпиской
            gameScene.events.off("updateWave");
            gameScene.events.off("damageHuman");

            gameScene.events.on("updateWave", (wave) => {
              if (this.waveText && this.waveText.active) {
                this.waveText.setText(`Волна ${wave}`);
              }
            });

            gameScene.events.on("damageHuman", (damage) => {
              if (gameScene.isHumanDead) return;
              console.log(
                `💥 UIScene: damageHuman вызван! Урон: ${damage}, HP до: ${gameScene.humanHealth}, HP после: ${gameScene.humanHealth - damage}`,
              );
              gameScene.humanHealth -= damage;
              this.updateHealthBar(gameScene.humanHealth);

              // Визуальная обратная связь
              if (damage > 0) {
                // Урон - красное мигание
                gameScene.human.setTint(0xff0000);
                gameScene.time.delayedCall(200, () => {
                  if (gameScene.human) gameScene.human.clearTint();
                });

                // Показываем текст урона
                const damageText = this.add
                  .text(
                    gameScene.human.x,
                    gameScene.human.y - 150,
                    `-${damage}`,
                    {
                      fontSize: "32px",
                      color: "#ff0000",
                      fontFamily: "3_Muz-TV2000.ttf",
                      stroke: "#000",
                      strokeThickness: 4,
                    },
                  )
                  .setOrigin(0.5);

                this.tweens.add({
                  targets: damageText,
                  y: damageText.y - 50,
                  alpha: 0,
                  duration: 1000,
                  onComplete: () => damageText.destroy(),
                });
              } else {
                // Лечение - зелёное мигание
                gameScene.human.setTint(0x00ff00);
                gameScene.time.delayedCall(400, () => {
                  if (gameScene.human) gameScene.human.clearTint();
                });

                // Показываем текст лечения
                const healText = this.add
                  .text(
                    gameScene.human.x,
                    gameScene.human.y - 150,
                    `+${Math.abs(damage)}`,
                    {
                      fontSize: "32px",
                      color: "#00ff00",
                      fontFamily: "3_Muz-TV2000.ttf",
                      stroke: "#000",
                      strokeThickness: 4,
                    },
                  )
                  .setOrigin(0.5);

                this.tweens.add({
                  targets: healText,
                  y: healText.y - 50,
                  alpha: 0,
                  duration: 1000,
                  onComplete: () => healText.destroy(),
                });
              }

              if (gameScene.humanHealth <= 0) {
                gameScene.isHumanDead = true;
                const human = gameScene.human;
                human.anims.play("human_death", true);
                human.on(
                  "animationcomplete",
                  () => {
                    // Прячем человека
                    human.setVisible(false);

                    // Создаём могилку на месте человека
                    const graveX = human.x;
                    const graveY = human.y;

                    // Основание могилы (прямоугольник)
                    const graveBase = this.add.rectangle(
                      graveX,
                      graveY - 50,
                      50,
                      80,
                      0x222222,
                    );
                    graveBase.setStrokeStyle(2, 0x000000);

                    // Верхняя часть (закругленная)
                    const graveTop = this.add.ellipse(
                      graveX,
                      graveY - 90,
                      50,
                      40,
                      0x222222,
                    );
                    graveTop.setStrokeStyle(2, 0x000000);

                    // Крест
                    const crossVertical = this.add.rectangle(
                      graveX,
                      graveY - 75,
                      5,
                      30,
                      0x888888,
                    );
                    const crossHorizontal = this.add.rectangle(
                      graveX,
                      graveY - 83,
                      20,
                      5,
                      0x888888,
                    );

                    gameScene.scene.pause();

                    // Показываем Game Over экран
                    this.showGameOver("GameScene", "UIScene");
                  },
                  this,
                );
              }
            });
          }
        }
        updateHealthBar(health) {
          const currentHealth = Math.max(0, health);
          this.healthBar.width = (currentHealth / 100) * 160;
          if (currentHealth > 60) this.healthBar.setFillStyle(0x00ff00);
          else if (currentHealth > 30) this.healthBar.setFillStyle(0xffff00);
          else this.healthBar.setFillStyle(0xff0000);
          this.healthText.setText(`HP: ${currentHealth}%`);
        }

        showGameOver(sceneName, uiSceneName) {
          console.log("=== ПОКАЗЫВАЕМ GAME OVER ===");
          const gameOverText = this.add
            .text(400, 300, "ИГРА ОКОНЧЕНА", {
              fontSize: "200px",
              fontFamily: '"3_Muz-TV2000.ttf"',
              color: "#ff0000",
              stroke: "#000000",
              strokeThickness: 12,
            })
            .setOrigin(0.5)
            .setShadow(10, 10, "#000000", 20, true, true);

          console.log("Создан текст ИГРА ОКОНЧЕНА с fontSize: 200px");

          // Анимация появления
          this.tweens.add({
            targets: gameOverText,
            alpha: { from: 0, to: 1 },
            scale: { from: 0.5, to: 1.0 },
            duration: 600,
            ease: "Back.easeOut",
          });

          // Через 5 секунд возврат в меню
          this.time.delayedCall(5000, () => {
            this.scene.stop(sceneName);
            this.scene.stop(uiSceneName);
            this.scene.start("MainMenuScene");
          });
        }

        shutdown() {
          // Очищаем все события при остановке сцены
          const gameScene = this.scene.get("GameScene");
          if (gameScene) {
            gameScene.events.off("updateWave");
            gameScene.events.off("damageHuman");
          }
        }
      }

      class Scene2 extends Phaser.Scene {

          this.homeless.setCollideWorldBounds(true);
          this.homeless.body.setSize(

            this.homeless.height * 0.9,
          );
          this.homeless.setVisible(false); // Скрыт до 6-й волны
          this.homeless.active = false;
          this.homeless.isFallen = false; // Флаг состояния падения
          this.homeless.isVictory = false; // Флаг анимации победы
          this.homelessActive = false;
          this.homelessFacing = "left";
          this.homelessTargetMushroom = null; // Гриб к которому бежит бомж
          this.homelessHealth = 100; // *** Здоровье бомжа ***
          this.isHomelessDead = false; // *** Флаг смерти бомжа ***

          // *** AI таймер для собаки (как в меню) ***
          this.time.addEvent({
            delay: Phaser.Math.Between(1000, 3000),
            loop: true,
            callback: () => {
              if (this.isDogDead) return;
              const action = Phaser.Math.RND.pick(["left", "right", "idle"]);
              switch (action) {
                case "left":
                  this.dog.setVelocityX(-100);
                  this.dogDirection = "left";
                  break;
                case "right":
                  this.dog.setVelocityX(100);
                  this.dogDirection = "right";
                  break;
                case "idle":
                  this.dog.setVelocityX(0);
                  break;
              }
            },
          });

          this.cursors = this.input.keyboard.createCursorKeys();
          this.jumpKey = this.input.keyboard.addKey(

          );

          this.ticks = this.physics.add.group();
          this.mushrooms = this.add.group();

        update() {
          if (this.isDogDead || this.isHumanDead) return;

          // Переключение debug режима по клавише D
          if (Phaser.Input.Keyboard.JustDown(this.debugKey)) {
            this.physics.world.debugGraphic.visible =
              !this.physics.world.debugGraphic.visible;
          }

          this.updateHumanPlayer(); // *** Игрок управляет человеком ***
          this.updateDogAI(); // *** Собака на AI ***
          this.updateHomeless(); // *** Бомж на AI ***
          this.updateCollisions();
        }

        spawnMushroom() {
          if (this.isDogDead || this.isHumanDead) return;
          if (this.mushrooms.countActive(true) > 0) return;
          const x = Phaser.Math.Between(100, 700);
          const mushroom = this.mushrooms.create(x, 580, "mushroom");
          mushroom.setOrigin(0.5, 1).setScale(0.1);
          mushroom.collected = false; // Флаг - был ли подобран гриб
          this.time.delayedCall(
            8000,
            () => {
              // Удаляем только если гриб НЕ был подобран
              if (mushroom.active && !mushroom.collected) {
                console.log("Гриб исчез (не был подобран)");
                mushroom.destroy();
              }
            },
            [],
            this,
          );
        }

        collectMushroom(human, mushroom) {
          if (this.human.hasMushroom) return;
          mushroom.collected = true; // Помечаем что гриб подобран
          mushroom.destroy();
          this.human.hasMushroom = true;
          this.human.setTint(0x00ff00);
          console.log("Человек подобрал гриб, таймер запущен на 8 секунд");

          // *** НОВОЕ: Если гриб не отдали собаке за 8 секунд, человек его съедает сам ***
          this.mushroomCarryTimer = this.time.delayedCall(
            8000,
            () => {
              console.log(
                "Таймер истёк! Проверка: this.human.hasMushroom =",
                this.human.hasMushroom,
              );
              if (this.human && this.human.hasMushroom) {
                // Человек съедает гриб и лечится
                this.human.hasMushroom = false;
                this.human.clearTint();
                console.log(
                  "Человек съедает гриб! Отправляем событие healHuman",
                );
                this.events.emit("healHuman", 20); // Лечим человека
              } else {
                console.log("Человек уже отдал гриб или его нет");
              }
            },
            [],
            this,
          );
        }

        deliverMushroom() {
          if (!this.human.hasMushroom) {
            console.log("deliverMushroom: у человека нет гриба");
            return;
          }
          console.log("deliverMushroom: человек отдаёт гриб собаке");
          this.human.hasMushroom = false;
          this.human.clearTint();
          this.events.emit("healDog", 20); // *** Собака получает HP ***
          if (this.mushroomCarryTimer) {
            console.log("deliverMushroom: отменяем таймер гриба");
            this.mushroomCarryTimer.remove();
          }
        }

        updateCollisions() {
          // *** НОВАЯ ЛОГИКА: Зона у ног ЛОВИТ клещей ***
          this.physics.overlap(this.footZone, this.ticks, (footZone, tick) => {
            if (
              !this.human.hasMushroom &&
              tick.isFalling &&
              tick.body &&
              !tick.isKicked
            ) {
              console.log("Клещ пойман зоной у ног! ПИНОК!");

              // *** ЭФФЕКТ ПИНКА ***
              tick.isKicked = true; // Помечаем что клещ был пнут
              tick.isFalling = false; // Больше не может наносить урон

              // *** УВЕЛИЧИВАЕМ СЧЁТЧИК ПИНКОВ ***
              this.kickedTicksCount++;
              console.log(
                `⚡ Пнуто клещей: ${this.kickedTicksCount}/${this.kicksNeededForReward}`,
              );

              // Обновляем UI
              this.events.emit(
                "updateKickCount",
                this.kickedTicksCount,
                this.kicksNeededForReward,
              );

              // Проверяем достижение награды
              if (this.kickedTicksCount >= this.kicksNeededForReward) {
                this.kickedTicksCount = 0; // Сбрасываем счётчик

                // Обновляем UI (сброс счётчика)
                this.events.emit(
                  "updateKickCount",
                  this.kickedTicksCount,
                  this.kicksNeededForReward,
                );

                // *** НАГРАДА: +20 HP ОБОИМ! ***
                console.log(
                  "🎁 НАГРАДА! За 3 пинка клещей: +20 HP человеку и собаке!",
                );

                // Лечим человека
                if (!this.isHumanDead) {
                  this.events.emit("healHuman", 20);
                }

                // Лечим собаку
                if (!this.isDogDead) {
                  this.events.emit("healDog", 20);
                }

                // Визуальный эффект награды
                const rewardText = this.add
                  .text(400, 200, "+20 HP!", {
                    fontSize: "48px",
                    fontFamily: '"3_Muz-TV2000.ttf"',
                    color: "#00ff00",
                    stroke: "#000",
                    strokeThickness: 6,
                  })
                  .setOrigin(0.5);

                this.tweens.add({
                  targets: rewardText,
                  y: rewardText.y - 50,
                  alpha: 0,
                  scale: 1.5,
                  duration: 1500,
                  ease: "Power2",
                  onComplete: () => rewardText.destroy(),
                });
              }

              // Определяем направление пинка (противоположное направлению человека)
              const kickDirection = this.humanFacing === "right" ? 1 : -1;
              const kickDistance = 200; // Дистанция полёта
              const kickHeight = 150; // Высота дуги

              const startX = tick.x;
              const startY = tick.y;
              const endX = startX + kickDistance * kickDirection;

              // Останавливаем физику для клеща
              tick.body.setVelocity(0, 0);

              // Визуальный эффект - серый цвет (обезврежен)
              tick.setTint(0x888888);

              // Анимация полёта по дуге
              this.tweens.add({
                targets: tick,
                x: endX,
                scale: 0.5, // Уменьшаем размер во время полёта
                ease: "Sine.easeOut",
                duration: 500,
                onUpdate: (tween) => {
                  const t = tween.progress;
                  // Параболическая траектория вверх и вниз
                  tick.y = startY - 4 * kickHeight * t * (1 - t);
                  // Быстрое вращение клеща во время полёта
                  tick.rotation = t * Math.PI * 4 * kickDirection;
                  // Постепенное исчезновение
                  tick.alpha = 1 - t * 0.5;
                },
                onComplete: () => {
                  if (tick && tick.active) {
                    console.log("Клещ приземлился и исчезает");
                    tick.destroy();
                  }
                },
              });
            }
          });

          // *** НОВАЯ ЛОГИКА: Пинаем бомжа ногами во время прыжка ***
          if (
            this.homelessActive &&
            !this.homeless.isFallen &&
            !this.homeless.isVictory &&
            this.isJumping
          ) {
            this.physics.overlap(
              this.footZone,
              this.homeless,
              (footZone, homeless) => {
                if (
                  this.isJumping &&
                  !homeless.isFallen &&
                  !homeless.isVictory
                ) {
                  console.log("👟 Игрок пнул бомжа в прыжке!");
                  console.log(
                    `📍 ПАДЕНИЕ: До - Y=${homeless.y}, origin=(${homeless.originX}, ${homeless.originY})`,
                  );

                  // *** НАНОСИМ УРОН БОМЖУ ***
                  this.events.emit("damageHomeless", 50); // -5 HP за пинок

                  // Проверяем смерть бомжа
                  if (this.homelessHealth <= 0 && !this.isHomelessDead) {
                    this.isHomelessDead = true;
                    console.log("💀 БОМЖ УМЕР!");
                    this.homelessDied(homeless);
                    return; // Не даём бомжу встать
                  }

                  // Помечаем что бомж упал
                  homeless.isFallen = true;
                  homeless.isVictory = false; // Прерываем анимацию победы
                  homeless.setVelocityX(0);

                  // Сохраняем оригинальную Y позицию
                  homeless.originalY = homeless.y;

                  // Меняем origin чтобы спрайт не обрезался при падении
                  // Origin (0.5, 1) = низ по центру, (0.5, 0.5) = центр спрайта
                  // При смене origin спрайт визуально сместится, компенсируем это
                  const spriteHeight = 312; // Высота спрайта бомжа
                  homeless.setOrigin(0.5, 0.5);
                  homeless.y = homeless.y - spriteHeight / 2; // Компенсация: поднимаем на половину высоты

                  console.log(
                    `📍 ПАДЕНИЕ: После - Y=${homeless.y}, origin=(${homeless.originX}, ${homeless.originY}), originalY=${homeless.originalY}`,
                  );

                  // Проигрываем анимацию падения
                  homeless.anims.play("homeless_death", true);

                  // После анимации падения (3 секунды) бомж встаёт
                  this.time.delayedCall(3000, () => {
                    if (homeless && homeless.active) {
                      console.log(
                        `📍 ВСТАЁТ: До - Y=${homeless.y}, origin=(${homeless.originX}, ${homeless.originY})`,
                      );
                      homeless.isFallen = false;
                      homeless.setOrigin(0.5, 1); // Сначала возвращаем origin
                      homeless.y = homeless.originalY; // Потом возвращаем позицию
                      console.log(
                        `📍 ВСТАЁТ: После - Y=${homeless.y}, origin=(${homeless.originX}, ${homeless.originY})`,
                      );
                      console.log("🧔 Бомж встал и снова бегает!");
                    }
                  });
                }
              },
            );
          }

          // *** НОВАЯ ЛОГИКА: Зона у головы ПОЛУЧАЕТ УРОН ***
          this.physics.overlap(this.mouth, this.ticks, (mouth, tick) => {
            if (tick.isFalling && tick.body && !tick.isKicked) {
              const damageMultiplier =
                this.registry.get("damageMultiplier") || 1;
              const damage = 10 * damageMultiplier;
              console.log(`Клещ попал в голову человека! Урон -${damage} HP`);
              this.events.emit("damageHuman", damage);
              tick.destroy();
            }
          });

          // *** Клещи наносят урон СОБАКЕ ***
          this.physics.overlap(this.dog, this.ticks, (dog, tick) => {
            if (tick.isFalling && tick.body && !tick.isKicked) {
              const damageMultiplier =
                this.registry.get("damageMultiplier") || 1;
              const damage = 10 * damageMultiplier;
              console.log(`Клещ попал в собаку! Урон -${damage} HP`);
              this.events.emit("damageDog", damage);
              tick.destroy();
            }
          });

          // *** Человек собирает грибы ***
          this.mushrooms.getChildren().forEach((mushroom) => {
            if (!mushroom.active) return;
            if (
              Phaser.Geom.Intersects.RectangleToRectangle(
                this.human.getBounds(),
                mushroom.getBounds(),
              )
            ) {
              this.collectMushroom(this.human, mushroom);
            }
          });

          // *** Человек передаёт гриб собаке ***
          if (
            this.human.hasMushroom &&
            Phaser.Geom.Intersects.RectangleToRectangle(
              this.dog.getBounds(),
              this.human.getBounds(),
            )
          ) {
            this.deliverMushroom();
          }
        }

        // *** ИГРОК УПРАВЛЯЕТ ЧЕЛОВЕКОМ ***
        updateHumanPlayer() {
          // Получаем джойстик для мобильных
          const joystickState = this.registry.get("joystickState") || {};
          const isMobile = this.registry.get("isMobile") || false;

          // Обновляем позиции зон
          this.mouth.x = this.human.body.center.x; // Зона у головы
          this.mouth.y = this.human.body.center.y - 100;

          this.footZone.x = this.human.body.center.x; // Зона у ног (очень широкая, почти на земле)
          this.footZone.y = this.human.body.center.y + 120;

          if (this.human.hasMushroom) {
            this.carriedMushroom.setVisible(true);
            const offset = this.humanFacing === "left" ? -60 : 60;
            this.carriedMushroom.x = this.human.x + offset;
            this.carriedMushroom.y = this.human.y - 150;

            // *** НОВОЕ: Джойстик вниз - человек съедает гриб сам ***
            const downPressed =
              Phaser.Input.Keyboard.JustDown(this.cursors.down) ||
              (isMobile && joystickState.down);
            if (downPressed) {
              console.log("🧑 Человек съел гриб! (джойстик вниз)");
              this.human.hasMushroom = false;
              this.human.clearTint();
              if (this.mushroomCarryTimer) {
                this.mushroomCarryTimer.remove();
              }
              // Лечим человека
              this.events.emit("healHuman", 20);
            }
          } else {
            this.carriedMushroom.setVisible(false);
          }

          // Прыжок - клавиатура или свайп вверх
          const jumpPressed =
            Phaser.Input.Keyboard.JustDown(this.jumpKey) ||
            (isMobile && joystickState.isJumping);
          if (jumpPressed && !this.isJumping) {
            this.isJumping = true;

            // Определяем направление прыжка
            let jumpVelocityX = 0;

            if (isMobile && joystickState.jumpDirection) {
              // Прыжок по диагонали на мобильном (свайп вверх-влево/вправо)
              if (joystickState.jumpDirection === "left") {
                jumpVelocityX = -200;
                this.humanFacing = "left";
                this.human.flipX = true;
              } else if (joystickState.jumpDirection === "right") {
                jumpVelocityX = 200;
                this.humanFacing = "right";
                this.human.flipX = false;
              }
            } else {
              // Клавиатура или прыжок на месте
              const leftPressed = this.cursors.left.isDown;
              const rightPressed = this.cursors.right.isDown;

              if (leftPressed) {
                jumpVelocityX = -200;
                this.humanFacing = "left";
                this.human.flipX = true;
              } else if (rightPressed) {
                jumpVelocityX = 200;
                this.humanFacing = "right";
                this.human.flipX = false;
              }
            }

            this.human.setVelocityX(jumpVelocityX);

            this.tweens.add({
              targets: this.human,
              y: this.human.y - 280,
              duration: 400,
              yoyo: true,
              ease: "Power2",
              onComplete: () => {
                this.isJumping = false;
                this.human.setVelocityX(0);
              },
            });
          }

          if (this.isJumping) return;

          // Горизонтальное движение - клавиатура или свайп влево/вправо
          const leftPressed =
            this.cursors.left.isDown || (isMobile && joystickState.left);
          const rightPressed =
            this.cursors.right.isDown || (isMobile && joystickState.right);

          if (leftPressed) {
            this.human.setVelocityX(-200);
            this.human.anims.play("human_walk", true);
            this.human.flipX = true;
            this.humanFacing = "left";
          } else if (rightPressed) {
            this.human.setVelocityX(200);
            this.human.anims.play("human_walk", true);
            this.human.flipX = false;
            this.humanFacing = "right";
          } else {
            this.human.setVelocityX(0);
            this.human.anims.play("human_idle", true);
          }
        }

        // *** СОБАКА НА AI (как в меню) ***
        updateDogAI() {
          this.dog.flipX = false;
          if (this.dog.body.velocity.x < 0) {
            this.dog.anims.play("dog_walk_left", true);
          } else if (this.dog.body.velocity.x > 0) {
            this.dog.anims.play("dog_walk_right", true);
          } else {
            this.dog.anims.play("dog_idle", true);
            this.dog.flipX = this.dogDirection === "left";
          }
        }

        // *** БОМЖ НА AI - бегает за грибами ***
        updateHomeless() {
          if (!this.homelessActive) return;

          // Если бомж упал - он лежит и не двигается
          if (this.homeless.isFallen) {
            this.homeless.setVelocityX(0);
            return;
          }

          // Если бомж празднует победу - не двигается
          if (this.homeless.isVictory) {
            this.homeless.setVelocityX(0);
            return;
          }

          // Ищем ближайший гриб
          const mushrooms = this.mushrooms
            .getChildren()
            .filter((m) => m.active);

          if (mushrooms.length > 0) {
            // Находим ближайший гриб
            let closestMushroom = null;
            let closestDistance = Infinity;

            mushrooms.forEach((mushroom) => {
              const distance = Phaser.Math.Distance.Between(
                this.homeless.x,
                this.homeless.y,
                mushroom.x,
                mushroom.y,
              );
              if (distance < closestDistance) {
                closestDistance = distance;
                closestMushroom = mushroom;
              }
            });

            // Бежим к ближайшему грибу
            if (closestMushroom) {
              const speed = 150; // Скорость бомжа
              const diff = closestMushroom.x - this.homeless.x;

              if (Math.abs(diff) > 10) {
                // Двигаемся к грибу
                if (diff > 0) {
                  this.homeless.setVelocityX(speed);
                  this.homeless.flipX = false;
                  this.homelessFacing = "right";
                } else {
                  this.homeless.setVelocityX(-speed);
                  this.homeless.flipX = true;
                  this.homelessFacing = "left";
                }
                this.homeless.anims.play("homeless_run", true);
              } else {
                // Достигли гриба - пытаемся подобрать
                this.homeless.setVelocityX(0);
                this.homeless.anims.play("homeless_idle", true);
              }

              // Проверяем коллизию с грибом
              if (
                Phaser.Geom.Intersects.RectangleToRectangle(
                  this.homeless.getBounds(),
                  closestMushroom.getBounds(),
                )
              ) {
                console.log("🧔 Бомж подобрал гриб!");
                closestMushroom.destroy();

                // *** ЛЕЧИМ БОМЖА ***
                if (!this.isHomelessDead) {
                  this.events.emit("healHomeless", 40); // +40 HP за гриб
                }

                // Анимация победы на 1 секунду
                this.homeless.setVelocityX(0);
                this.homeless.anims.play("homeless_victory", true);
                this.homeless.isVictory = true;

                this.time.delayedCall(1000, () => {
                  if (this.homeless && this.homeless.active) {
                    this.homeless.isVictory = false;
                  }
                });
              }
            }
          } else {
            // Нет грибов - просто ходим случайно
            if (
              !this.homelessWalkTimer ||
              this.time.now > this.homelessWalkTimer
            ) {
              const action = Phaser.Math.RND.pick(["left", "right", "idle"]);
              switch (action) {
                case "left":
                  this.homeless.setVelocityX(-80);
                  this.homeless.flipX = true;
                  this.homelessFacing = "left";
                  break;
                case "right":
                  this.homeless.setVelocityX(80);
                  this.homeless.flipX = false;
                  this.homelessFacing = "right";
                  break;
                case "idle":
                  this.homeless.setVelocityX(0);
                  break;
              }
              this.homelessWalkTimer =
                this.time.now + Phaser.Math.Between(2000, 4000);
            }

            // Анимация в зависимости от скорости
            if (Math.abs(this.homeless.body.velocity.x) > 0) {
              this.homeless.anims.play("homeless_walk", true);
            } else {
              this.homeless.anims.play("homeless_idle", true);
            }
          }
        }

        homelessDied(homeless) {
          console.log("💀 БОМЖ УМЕР! Проигрываем анимацию смерти...");

          // Останавливаем бомжа
          homeless.setVelocityX(0);
          homeless.isFallen = true;

          // *** АНИМАЦИЯ ПАДЕНИЯ (как при обычном пинке) ***
          // Сохраняем позицию
          const fallPositionX = homeless.x;
          const fallPositionY = homeless.y;

          // Меняем origin чтобы спрайт не обрезался при падении
          const spriteHeight = 312; // Высота спрайта бомжа
          homeless.setOrigin(0.5, 0.5);
          homeless.y = homeless.y - spriteHeight / 2; // Компенсация: поднимаем на половину высоты

          // Проигрываем анимацию падения
          homeless.anims.play("homeless_death", true);
          console.log(
            `💀 Анимация падения запущена на позиции (${fallPositionX}, ${fallPositionY})`,
          );

          // Рисуем растекающуюся жёлтую лужу
          // Создаём графику для лужи
          const puddle = this.add.graphics();
          puddle.fillStyle(0xffff00, 0.6); // Жёлтый цвет
          puddle.setDepth(-1); // Под персонажем

          // Анимация растекания лужи
          let puddleRadius = 0;
          const maxRadius = 80; // Максимальный радиус лужи

          const puddleTimer = this.time.addEvent({
            delay: 50,
            repeat: 40,
            callback: () => {
              puddleRadius += 2;
              puddle.clear();
              puddle.fillStyle(0xffff00, 0.6);

              // Рисуем овальную лужу (эллипс)
              puddle.fillEllipse(
                fallPositionX,
                fallPositionY,
                puddleRadius * 1.5,
                puddleRadius,
              );

              // Добавляем неровные края для реалистичности
              for (let i = 0; i < 5; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = puddleRadius * (0.8 + Math.random() * 0.4);
                const blobX = fallPositionX + Math.cos(angle) * distance;
                const blobY = fallPositionY + Math.sin(angle) * distance * 0.7;
                const blobSize = 5 + Math.random() * 10;
                puddle.fillCircle(blobX, blobY, blobSize);
              }
            },
          });

          // Через 4 секунды переключаемся на Scene4
          this.time.delayedCall(4000, () => {
            console.log("🎬 Переход на Scene4...");
            this.scene.stop("Scene2");
            this.scene.stop("UIScene2");
            this.scene.stop("VirtualControlsScene");
            this.scene.start("Scene4");
            this.scene.launch("UIScene4");
            this.scene.launch("VirtualControlsScene");
          });
        }

        startWave() {
          if (this.wave > 12) {
            this.scene.stop("Scene2");
            this.scene.stop("UIScene2");
            this.scene.start("MainMenuScene");
            return;
          }
          if (this.isDogDead || this.isHumanDead) return;
          this.ticksSpawned = 0;
          this.events.emit("updateWave", this.wave);

          // *** Активируем бомжа после 6-й волны ***
          if (this.wave >= 6 && !this.homelessActive) {
            this.homelessActive = true;
            this.homeless.setVisible(true);
            this.homeless.active = true;
            this.events.emit("showHomelessBar"); // Показываем шкалу HP
            console.log("🧔 БОМЖ ПОЯВИЛСЯ! Теперь он будет собирать грибы!");
          }

          if (this.tickSpawner) this.tickSpawner.remove();
          this.tickSpawner = this.time.addEvent({
            delay: this.spawnInterval,
            loop: true,
            callback: () => {
              if (this.ticksSpawned >= this.ticksToSpawn) {
                this.tickSpawner.remove();
                this.time.delayedCall(2000, () => {
                  this.wave++;
                  this.ticksToSpawn = Math.floor(this.ticksToSpawn * 1.4);
                  this.spawnInterval = Math.max(600, this.spawnInterval - 150);
                  this.startWave();
                });
                return;
              }
              this.spawnTick();
              this.ticksSpawned++;
            },
          });
        }

        spawnTick() {
          if (this.isDogDead || this.isHumanDead) return;
          const startX = Phaser.Math.Between(50, 750);
          const startY = 580;
          const peakY = Phaser.Math.Between(100, 300);
          const endX = startX + Phaser.Math.Between(-150, 150);

          // *** ИСПРАВЛЕНИЕ: Используем ticks.create() чтобы клещ добавился в группу ***
          const tick = this.ticks.create(startX, startY, "tick");
          if (!tick) return;

          tick.setScale(0.8);
          tick.body.setAllowGravity(false);
          tick.body.setSize(tick.width * 1.2, tick.height * 1.2); // Увеличиваем hitbox клеща
          tick.isFalling = false;
          console.log("Клещ создан на позиции", startX, startY);

          this.tweens.add({
            targets: tick,
            x: endX,
            ease: "Sine.easeInOut",
            duration: Phaser.Math.Between(1200, 1800),
            onUpdate: (tween, target) => {
              const t = tween.progress;
              const h = startY - peakY;
              target.y = startY - 4 * h * t * (1 - t);
              if (!target.isFalling && t > 0.5) {
                target.isFalling = true;
                console.log("Клещ начал падать! Теперь активен");
              }
            },
            onComplete: () => {
              if (tick.active) {
                console.log("Клещ достиг земли и удалён");
                tick.destroy();
              }
            },
          });
        }

        shutdown() {
          // Очищаем таймеры при остановке сцены
          if (this.tickSpawner) {
            this.tickSpawner.remove();
          }
          if (this.mushroomCarryTimer) {
            this.mushroomCarryTimer.remove();
          }
          // Очищаем все события
          this.events.off("updateWave");
          this.events.off("damageDog");
          this.events.off("damageHuman");
          this.events.off("healDog");
          this.events.off("healHuman");
          this.events.off("updateKickCount");
          this.events.off("showHomelessBar");
          this.events.off("damageHomeless");
          this.events.off("healHomeless");
        }
      }

      // =================================================================
      // SCENE 6: UI для второй фазы
      // =================================================================
      class UIScene2 extends Phaser.Scene {
        constructor() {
          super("UIScene2");
        }
        create() {
          const textStyle = {
            fontFamily: "3_Muz-TV2000.ttf",
            fontSize: "16px",
            fill: "#fff",
          };

          // *** ШКАЛА ЗДОРОВЬЯ СОБАКИ (слева) ***
          this.add.text(40, 15, "Собака:", textStyle);
          this.dogHealthBarBg = this.add
            .rectangle(120, 30, 160, 20, 0x000000)
            .setOrigin(0.5);
          this.dogHealthBar = this.add
            .rectangle(120, 30, 160, 20, 0x00ff00)
            .setOrigin(0.5);
          this.dogHealthText = this.add.text(45, 45, "HP: 100%", textStyle);

          // *** ШКАЛА ЗДОРОВЬЯ ЧЕЛОВЕКА (справа) ***
          this.add.text(600, 15, "Человек:", textStyle);
          this.humanHealthBarBg = this.add
            .rectangle(680, 30, 160, 20, 0x000000)
            .setOrigin(0.5);
          this.humanHealthBar = this.add
